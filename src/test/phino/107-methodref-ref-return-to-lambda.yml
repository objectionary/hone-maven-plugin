---
# yamllint disable rule:line-length
# An unbound-instance method reference whose referenced method returns an object
# (Pair::getKey, declared (Pair)Object) feeding a .map that instantiates the SAM
# to (Pair)String must be desugared into a lambda whose wrapper narrows the
# erased Object back to the instantiated String before areturn. 103 declines it
# (its primitive branches require the referenced return to equal the SAM return);
# 107 synthesises the wrapper `aload 0; invokevirtual Pair.getKey (); checkcast
# java/lang/String; areturn` and repoints the invokedynamic target handle at it.
# Without the checkcast the verifier rejects the wrapper with "Bad return type".
# The first match asserts the wrapper carries the narrowing checkcast to
# java/lang/String; the second asserts the target handle now points at THIS class
# "T" (before the rule it pointed at the Pair class).
rules:
  - src/main/resources/org/eolang/hone/rules/streams/1xx/107-methodref-ref-return-to-lambda.phr
input: |
  ⟦
    φ ↦ Φ.jeo.class,
    version ↦ 68,
    access ↦ 33,
    modifiers ↦ ⟦ φ ↦ Φ.jeo.modifiers, public ↦ Φ.true ⟧,
    name ↦ "T",
    supername ↦ "java/lang/Object",
    interfaces ↦ ⟦ φ ↦ Φ.jeo.seq.of0 ⟧,
    m ↦ ⟦
      φ ↦ Φ.jeo.method,
      access ↦ 9,
      modifiers ↦ ⟦ φ ↦ Φ.jeo.modifiers, static ↦ Φ.true ⟧,
      name ↦ "m",
      descriptor ↦ "()V",
      signature ↦ "",
      exceptions ↦ ⟦ φ ↦ Φ.jeo.seq.of0 ⟧,
      maxs ↦ ⟦ φ ↦ Φ.jeo.maxs, max-stack ↦ 2, max-locals ↦ 1 ⟧,
      params ↦ ⟦ φ ↦ Φ.jeo.params ⟧,
      annotations ↦ ⟦ φ ↦ Φ.jeo.seq.of0 ⟧,
      body ↦ ⟦
        φ ↦ Φ.jeo.seq.of,
        d ↦ ⟦
          φ ↦ Φ.jeo.opcode.invokedynamic,
          v0 ↦ "apply",
          v1 ↦ "()Ljava/util/function/Function;",
          h2 ↦ ⟦ φ ↦ Φ.jeo.handle, v0 ↦ 6, v1 ↦ "java/lang/invoke/LambdaMetafactory", v2 ↦ "metafactory", v3 ↦ "(Ljava/lang/invoke/MethodHandles$Lookup;Ljava/lang/String;Ljava/lang/invoke/MethodType;Ljava/lang/invoke/MethodType;Ljava/lang/invoke/MethodHandle;Ljava/lang/invoke/MethodType;)Ljava/lang/invoke/CallSite;", v4 ↦ Φ.false ⟧,
          t3 ↦ ⟦ φ ↦ Φ.jeo.type, v0 ↦ "(Ljava/lang/Object;)Ljava/lang/Object;" ⟧,
          h4 ↦ ⟦ φ ↦ Φ.jeo.handle, v0 ↦ 5, v1 ↦ "org/apache/commons/lang3/tuple/Pair", v2 ↦ "getKey", v3 ↦ "()Ljava/lang/Object;", v4 ↦ Φ.false ⟧,
          t5 ↦ ⟦ φ ↦ Φ.jeo.type, v0 ↦ "(Lorg/apache/commons/lang3/tuple/Pair;)Ljava/lang/String;" ⟧
        ⟧,
        i ↦ ⟦ φ ↦ Φ.jeo.opcode.invokeinterface, v0 ↦ "java/util/stream/Stream", v1 ↦ "map", v2 ↦ "(Ljava/util/function/Function;)Ljava/util/stream/Stream;", v3 ↦ Φ.true ⟧
      ⟧,
      trycatchblocks ↦ ⟦ φ ↦ Φ.jeo.seq.of0 ⟧,
      local-variable-table ↦ ⟦ φ ↦ Φ.jeo.seq.of0 ⟧
    ⟧
  ⟧
expected:
  - ⟦ 𝐵-x, φ ↦ Φ.jeo.opcode.checkcast, 𝐵-y, 𝜏-m ↦ "java/lang/String", 𝐵-z ⟧
  - ⟦ 𝐵-a, φ ↦ Φ.jeo.handle, 𝐵-b, 𝜏-c ↦ "T", 𝐵-d ⟧
