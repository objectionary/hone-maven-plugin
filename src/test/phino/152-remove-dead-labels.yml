---
# yamllint disable rule:line-length
# A label immediately followed by an opcode is dead and removed; a label
# immediately followed by a frame is a live jump target and is kept. The
# closed body pattern confirms exactly that: the first label is gone, the nop
# survives, and the second label with its frame stays.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/1xx/152-remove-dead-labels.phr
input: |
  {⟦
    body ↦ ⟦
      l1 ↦ ⟦ φ ↦ Φ.jeo.label, v0 ↦ "L1" ⟧,
      o1 ↦ ⟦ φ ↦ Φ.jeo.opcode.nop ⟧,
      l2 ↦ ⟦ φ ↦ Φ.jeo.label, v0 ↦ "L2" ⟧,
      f1 ↦ ⟦ φ ↦ Φ.jeo.frame, type ↦ 3, locals ↦ ⟦ φ ↦ Φ.jeo.seq.of0 ⟧, stack ↦ ⟦ φ ↦ Φ.jeo.seq.of0 ⟧ ⟧,
      ρ ↦ ∅
    ⟧
  ⟧}
expected:
  - ⟦ 𝜏-nop ↦ ⟦ φ ↦ Φ.jeo.opcode.nop ⟧, 𝜏-label ↦ ⟦ φ ↦ Φ.jeo.label, v0 ↦ "L2" ⟧, 𝜏-frame ↦ ⟦ φ ↦ Φ.jeo.frame, 𝐵-rest ⟧, ρ ↦ ∅ ⟧
