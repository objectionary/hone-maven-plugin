---
# yamllint disable rule:line-length
# 208 rewrites a Φ.hone.flatMap pragma in a caller method's body into a
# zero-capture cps Φ.hone.distill tagged with `start ↦ "flatMap"`. The
# distill's body invokes the user's lambda (consumes the item, leaves the
# user's Stream on top of stack) and ends with a single Φ.hone.emit marker
# that 493 later lowers to `aload consumer; invokeinterface
# Stream.forEach`.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/208-flatMap-to-distill.phr
input: |
  {⟦
    φ ↦ Φ.jeo.class,
    name ↦ "Foo",
    jm$main ↦ ⟦
      φ ↦ Φ.jeo.method,
      name ↦ "main",
      body ↦ ⟦
        i0 ↦ ⟦
          φ ↦ Φ.hone.flatMap,
          opcode ↦ "invokestatic",
          class ↦ "Foo",
          bridge-input ↦ "Ljava/lang/Integer;",
          bridge-output ↦ "Ljava/util/stream/Stream;",
          accepted ↦ "Ljava/lang/Integer;",
          returned ↦ "Ljava/util/stream/Stream;",
          static ↦ "true",
          target ↦ ⟦
            handle ↦ 6,
            class ↦ "Foo",
            method ↦ "lambda$main$0",
            signature ↦ "(Ljava/lang/Integer;)Ljava/util/stream/Stream;",
            is-interface ↦ Φ.false
          ⟧
        ⟧
      ⟧
    ⟧
  ⟧}
expected:
  - |
    ⟦
      φ ↦ Φ.hone.distill,
      class ↦ "Foo",
      bridge-input ↦ "Ljava/lang/Object;",
      bridge-output ↦ "Ljava/lang/Object;",
      start ↦ "flatMap",
      accepted ↦ "Ljava/lang/Integer;",
      returned ↦ "Ljava/lang/Object;",
      static ↦ "true",
      captures ↦ ⟦ ρ ↦ ∅ ⟧,
      emit-shape ↦ "cps",
      body ↦ 𝑒-body
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.invokestatic,
      i2 ↦ "Foo",
      i3 ↦ "lambda$main$0",
      i4 ↦ "(Ljava/lang/Integer;)Ljava/util/stream/Stream;",
      i5 ↦ Φ.false
    ⟧
  - |
    ⟦
      φ ↦ Φ.hone.emit,
      emit-context ↦ "top-level"
    ⟧
