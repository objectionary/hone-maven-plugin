---
# yamllint disable rule:line-length
# 208 rewrites a Φ.hone.flatMap pragma in a caller method's body into
# a Φ.hone.lambda(mapMulti) pragma, and synthesizes a sibling static
# wrapper method that calls the original flatMap target and forwards
# its returned Stream to the Consumer parameter via Stream.forEach.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/208-flatMap-to-mapMulti.phr
input: |
  {⟦
    φ ↦ Φ.jeo.class,
    name ↦ "Foo",
    jm$main ↦ ⟦
      φ ↦ Φ.jeo.method,
      name ↦ "main",
      body ↦ ⟦
        i0 ↦ ⟦
          φ ↦ Φ.hone.flatMap,
          opcode ↦ "invokestatic",
          class ↦ "Foo",
          bridge-input ↦ "Ljava/lang/Integer;",
          bridge-output ↦ "Ljava/util/stream/Stream;",
          accepted ↦ "Ljava/lang/Integer;",
          returned ↦ "Ljava/util/stream/Stream;",
          static ↦ "true",
          target ↦ ⟦
            handle ↦ 6,
            class ↦ "Foo",
            method ↦ "lambda$main$0",
            signature ↦ "(Ljava/lang/Integer;)Ljava/util/stream/Stream;",
            is-interface ↦ Φ.false
          ⟧
        ⟧
      ⟧
    ⟧
  ⟧}
expected:
  - ⟦ 𝐵-pre, 𝜏-flatMap-pragma ↦ ⟦ φ ↦ Φ.hone.lambda, 𝐵-lambda-pre, stream ↦ ⟦ class ↦ "java/util/stream/Stream", method ↦ "mapMulti", signature ↦ "(Ljava/util/function/BiConsumer;)Ljava/util/stream/Stream;" ⟧, 𝐵-lambda-post ⟧, 𝐵-post ⟧
  - ⟦ 𝐵-pre, 𝜏-wrapper ↦ ⟦ φ ↦ Φ.jeo.method, 𝐵-method-pre, body ↦ ⟦ φ ↦ Φ.jeo.seq.of, 𝐵-body-pre, 𝜏-invoke-static ↦ ⟦ φ ↦ Φ.jeo.opcode.invokestatic, i2 ↦ "Foo", i3 ↦ "lambda$main$0", 𝐵-istatic-rest ⟧, 𝐵-body-mid, 𝜏-invoke-forEach ↦ ⟦ φ ↦ Φ.jeo.opcode.invokeinterface, i2 ↦ "java/util/stream/Stream", i3 ↦ "forEach", 𝐵-iface-rest ⟧, 𝐵-body-post ⟧, 𝐵-method-post ⟧, 𝐵-post ⟧
