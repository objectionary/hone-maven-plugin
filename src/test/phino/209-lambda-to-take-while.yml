---
# yamllint disable rule:line-length
# 209 recognizes a Φ.hone.lambda whose stream call is Stream.takeWhile
# (i.e. a source-level .takeWhile(Predicate) invocation on the object
# Stream) and converts it into a Φ.hone.take-while pragma. This is
# analogous to 201 (filter); see issue #539. Folding into distill is
# left to a follow-up — for now 605 unrecognises the pragma so the
# pipeline stays roundtrip-safe.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/209-lambda-to-take-while.phr
input: |
  {⟦
    φ ↦ Φ.hone.lambda,
    class ↦ "Foo",
    method ↦ "test",
    interface ↦ "()Ljava/util/function/Predicate;",
    lambda-signature ↦ "(Ljava/lang/Object;)Z",
    bridge-signature ↦ "(Ljava/lang/Integer;)Z",
    static ↦ "true",
    opcode ↦ "invokestatic",
    target ↦ ⟦
      handle ↦ 6,
      class ↦ "Foo",
      method ↦ "lambda$main$0",
      signature ↦ "(Ljava/lang/Integer;)Z",
      is-interface ↦ Φ.false
    ⟧,
    stream ↦ ⟦
      class ↦ "java/util/stream/Stream",
      method ↦ "takeWhile",
      signature ↦ "(Ljava/util/function/Predicate;)Ljava/util/stream/Stream;"
    ⟧
  ⟧}
expected:
  - |
    ⟦
      φ ↦ Φ.hone.take-while,
      opcode ↦ "invokestatic",
      class ↦ "Foo",
      bridge-signature ↦ "(Ljava/lang/Integer;)Z",
      static ↦ "true",
      target ↦ ⟦
        handle ↦ 6,
        class ↦ "Foo",
        method ↦ "lambda$main$0",
        signature ↦ "(Ljava/lang/Integer;)Z",
        is-interface ↦ Φ.false
      ⟧
    ⟧
