---
# yamllint disable rule:line-length
# 214 recognizes a Φ.hone.lambda whose stream call is
# Stream.sorted(Comparator) inside its enclosing Φ.jeo.class formation,
# captures the real enclosing class name, and folds the lambda into a
# Φ.hone.distill with `emit-shape ↦ "driver"`, `start ↦ "sorted-
# comparator"`, and two captures (a Comparator carrying an inline
# Φ.jeo.opcode.invokedynamic init reconstructed from the lambda's
# target / signature fields, and an ArrayList with a `new + dup +
# invokespecial` init). The no-arg sorted() variant is recognised by
# 213-sorted-to-driver and is out of scope here. Issue #570 Step 5b.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/214-sorted-comparator-to-driver.phr
input: |
  {⟦
    φ ↦ Φ.jeo.class,
    version ↦ 66,
    access ↦ 33,
    name ↦ "Foo",
    supername ↦ "java/lang/Object",
    main ↦ ⟦
      φ ↦ Φ.jeo.method,
      access ↦ 4096,
      name ↦ "main",
      descriptor ↦ "()V",
      body ↦ ⟦
        i1 ↦ ⟦
          φ ↦ Φ.hone.lambda,
          class ↦ "Foo",
          method ↦ "compare",
          interface ↦ "()Ljava/util/function/Comparator;",
          lambda-signature ↦ "(Ljava/lang/Object;Ljava/lang/Object;)I",
          bridge-signature ↦ "(Ljava/lang/Integer;Ljava/lang/Integer;)I",
          static ↦ "true",
          opcode ↦ "invokestatic",
          target ↦ ⟦
            handle ↦ 6,
            class ↦ "Foo",
            method ↦ "lambda$main$0",
            signature ↦ "(Ljava/lang/Integer;Ljava/lang/Integer;)I",
            is-interface ↦ Φ.false
          ⟧,
          stream ↦ ⟦
            class ↦ "java/util/stream/Stream",
            method ↦ "sorted",
            signature ↦ "(Ljava/util/function/Comparator;)Ljava/util/stream/Stream;"
          ⟧
        ⟧
      ⟧
    ⟧
  ⟧}
expected:
  - |
    ⟦
      φ ↦ Φ.hone.distill,
      class ↦ "Foo",
      bridge-input ↦ "Ljava/lang/Object;",
      bridge-output ↦ "Ljava/lang/Object;",
      start ↦ "sorted-comparator",
      accepted ↦ "Ljava/lang/Object;",
      returned ↦ "Ljava/lang/Object;",
      static ↦ "true",
      captures ↦ ⟦
        c0 ↦ ⟦
          φ ↦ Φ.hone.capture,
          type ↦ "Ljava/util/Comparator;",
          init ↦ ⟦
            k0-indy ↦ ⟦
              φ ↦ Φ.jeo.opcode.invokedynamic,
              i2 ↦ "compare",
              i3 ↦ "()Ljava/util/function/Comparator;",
              i4 ↦ ⟦
                φ ↦ Φ.jeo.handle,
                i1 ↦ 6,
                i2 ↦ "java/lang/invoke/LambdaMetafactory",
                i3 ↦ "metafactory",
                i4 ↦ "(Ljava/lang/invoke/MethodHandles$Lookup;Ljava/lang/String;Ljava/lang/invoke/MethodType;Ljava/lang/invoke/MethodType;Ljava/lang/invoke/MethodHandle;Ljava/lang/invoke/MethodType;)Ljava/lang/invoke/CallSite;",
                i5 ↦ Φ.false
              ⟧,
              i5 ↦ ⟦
                φ ↦ Φ.jeo.type,
                i1 ↦ "(Ljava/lang/Object;Ljava/lang/Object;)I"
              ⟧,
              i6 ↦ ⟦
                φ ↦ Φ.jeo.handle,
                i1 ↦ 6,
                i2 ↦ "Foo",
                i3 ↦ "lambda$main$0",
                i4 ↦ "(Ljava/lang/Integer;Ljava/lang/Integer;)I",
                i5 ↦ Φ.false
              ⟧,
              i7 ↦ ⟦
                φ ↦ Φ.jeo.type,
                i1 ↦ "(Ljava/lang/Integer;Ljava/lang/Integer;)I"
              ⟧
            ⟧
          ⟧
        ⟧,
        c1 ↦ ⟦
          φ ↦ Φ.hone.capture,
          type ↦ "Ljava/util/ArrayList;",
          init ↦ ⟦
            k0-new ↦ ⟦
              φ ↦ Φ.jeo.opcode.new,
              i1 ↦ "java/util/ArrayList"
            ⟧,
            k1-dup ↦ ⟦ φ ↦ Φ.jeo.opcode.dup ⟧,
            k2-init ↦ ⟦
              φ ↦ Φ.jeo.opcode.invokespecial,
              i2 ↦ "java/util/ArrayList",
              i3 ↦ "<init>",
              i4 ↦ "()V",
              i5 ↦ Φ.false
            ⟧
          ⟧
        ⟧
      ⟧,
      emit-shape ↦ "driver",
      body ↦ ⟦
        b0-emit ↦ ⟦ φ ↦ Φ.hone.emit, emit-context ↦ "top-level" ⟧
      ⟧
    ⟧
