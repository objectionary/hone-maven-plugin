---
# yamllint disable rule:line-length
# 215 recognizes a source-level Φ.hone.lambda whose stream call is
# Stream.mapMulti and rewrites it into the canonical Φ.hone.mapMulti
# pragma — the same shape 501 emits for distill-derived mapMultis.
# This is the inverse of 601 and lets 512 fuse adjacent mapMultis
# from any source uniformly.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/215-lambda-to-mapMulti.phr
input: |
  {⟦
    φ ↦ Φ.hone.lambda,
    class ↦ "Foo",
    method ↦ "accept",
    interface ↦ "()Ljava/util/function/BiConsumer;",
    lambda-signature ↦ "(Ljava/lang/Object;Ljava/lang/Object;)V",
    bridge-signature ↦ "(Ljava/lang/Integer;Ljava/util/function/Consumer;)V",
    static ↦ "true",
    opcode ↦ "invokestatic",
    target ↦ ⟦
      handle ↦ 6,
      class ↦ "Foo",
      method ↦ "lambda$main$0",
      signature ↦ "(Ljava/lang/Integer;Ljava/util/function/Consumer;)V",
      is-interface ↦ Φ.false
    ⟧,
    stream ↦ ⟦
      class ↦ "java/util/stream/Stream",
      method ↦ "mapMulti",
      signature ↦ "(Ljava/util/function/BiConsumer;)Ljava/util/stream/Stream;"
    ⟧
  ⟧}
expected:
  - |
    ⟦
      φ ↦ Φ.hone.mapMulti,
      class ↦ "Foo",
      target-method ↦ "lambda$main$0",
      bridge-input ↦ "Ljava/lang/Integer;",
      map-multi-consumer ↦ "Ljava/util/function/BiConsumer;",
      lambda-signature ↦ "(Ljava/lang/Object;Ljava/lang/Object;)V",
      consumer ↦ "Ljava/util/function/Consumer;",
      stream-class ↦ "java/util/stream/Stream",
      static ↦ "true",
      is-interface ↦ Φ.false
    ⟧
