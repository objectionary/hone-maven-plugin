---
# yamllint disable rule:line-length
# 215 rewrites a recognised Stream.mapMulti(BiConsumer) call site into a
# zero-capture cps Φ.hone.distill with `start ↦ "mapMulti"`. The cps body
# loads the downstream Consumer and invokes the user's static lambda — no
# Φ.hone.emit marker, since the lambda already drives emission via its own
# consumer.accept calls.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/215-mapMulti-to-distill.phr
input: |
  {⟦
    φ ↦ Φ.hone.lambda,
    class ↦ "Foo",
    method ↦ "accept",
    interface ↦ "()Ljava/util/function/BiConsumer;",
    lambda-signature ↦ "(Ljava/lang/Object;Ljava/lang/Object;)V",
    bridge-signature ↦ "(Ljava/lang/Integer;Ljava/util/function/Consumer;)V",
    static ↦ "true",
    opcode ↦ "invokestatic",
    target ↦ ⟦
      handle ↦ 6,
      class ↦ "Foo",
      method ↦ "lambda$main$0",
      signature ↦ "(Ljava/lang/Integer;Ljava/util/function/Consumer;)V",
      is-interface ↦ Φ.false
    ⟧,
    stream ↦ ⟦
      class ↦ "java/util/stream/Stream",
      method ↦ "mapMulti",
      signature ↦ "(Ljava/util/function/BiConsumer;)Ljava/util/stream/Stream;"
    ⟧
  ⟧}
expected:
  - |
    ⟦
      φ ↦ Φ.hone.distill,
      class ↦ "Foo",
      bridge-input ↦ "Ljava/lang/Object;",
      bridge-output ↦ "Ljava/lang/Object;",
      start ↦ "mapMulti",
      accepted ↦ "Ljava/lang/Integer;",
      returned ↦ "Ljava/lang/Object;",
      static ↦ "true",
      captures ↦ ⟦ ρ ↦ ∅ ⟧,
      emit-shape ↦ "cps",
      body ↦ 𝑒-body
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.aload,
      i1 ↦ 1
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.invokestatic,
      i2 ↦ "Foo",
      i3 ↦ "lambda$main$0",
      i4 ↦ "(Ljava/lang/Integer;Ljava/util/function/Consumer;)V",
      i5 ↦ Φ.false
    ⟧
