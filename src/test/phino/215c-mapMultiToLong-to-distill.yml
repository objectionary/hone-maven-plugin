---
# yamllint disable rule:line-length
# 215c rewrites a recognised Stream.mapMultiToLong(BiConsumer) call site
# into a zero-capture cps Φ.hone.distill with `start ↦ "mapMultiToLong"`
# and `bridge-output ↦ "J"`.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/215c-mapMultiToLong-to-distill.phr
input: |
  {⟦
    φ ↦ Φ.hone.lambda,
    class ↦ "Foo",
    method ↦ "accept",
    interface ↦ "()Ljava/util/function/BiConsumer;",
    lambda-signature ↦ "(Ljava/lang/Object;Ljava/lang/Object;)V",
    bridge-signature ↦ "(Ljava/lang/Integer;Ljava/util/function/LongConsumer;)V",
    static ↦ "true",
    opcode ↦ "invokestatic",
    target ↦ ⟦
      handle ↦ 6,
      class ↦ "Foo",
      method ↦ "lambda$main$0",
      signature ↦ "(Ljava/lang/Integer;Ljava/util/function/LongConsumer;)V",
      is-interface ↦ Φ.false
    ⟧,
    stream ↦ ⟦
      class ↦ "java/util/stream/Stream",
      method ↦ "mapMultiToLong",
      signature ↦ "(Ljava/util/function/BiConsumer;)Ljava/util/stream/LongStream;"
    ⟧
  ⟧}
expected:
  - |
    ⟦
      φ ↦ Φ.hone.distill,
      class ↦ "Foo",
      bridge-input ↦ "Ljava/lang/Object;",
      bridge-output ↦ "J",
      start ↦ "mapMultiToLong",
      accepted ↦ "Ljava/lang/Integer;",
      returned ↦ "J",
      static ↦ "true",
      captures ↦ ⟦ ρ ↦ ∅ ⟧,
      emit-shape ↦ "cps",
      body ↦ 𝑒-body
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.aload,
      i1 ↦ 1
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.invokestatic,
      i2 ↦ "Foo",
      i3 ↦ "lambda$main$0",
      i4 ↦ "(Ljava/lang/Integer;Ljava/util/function/LongConsumer;)V",
      i5 ↦ Φ.false
    ⟧
