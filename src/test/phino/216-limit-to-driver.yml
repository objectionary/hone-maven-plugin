---
# yamllint disable rule:line-length
# 216 recognizes the `ldc N + invokeinterface
# java/util/stream/Stream.limit:(J)Ljava/util/stream/Stream;` opcode
# pair inside its enclosing Φ.jeo.class formation, captures the real
# enclosing class name, captures the count literal as `count ↦ 𝑒-count`
# inside the c0 capture formation, and folds the pair into a
# Φ.hone.distill with `emit-shape ↦ "driver"` and one `long[1]` counter
# capture. Issue #570 Step 6.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/216-limit-to-driver.phr
input: |
  {⟦
    φ ↦ Φ.jeo.class,
    version ↦ 66,
    access ↦ 33,
    name ↦ "Foo",
    supername ↦ "java/lang/Object",
    main ↦ ⟦
      φ ↦ Φ.jeo.method,
      access ↦ 4096,
      name ↦ "main",
      descriptor ↦ "()V",
      body ↦ ⟦
        i1 ↦ ⟦
          φ ↦ Φ.jeo.opcode.ldc,
          i1 ↦ ⟦
            φ ↦ Φ.jeo.long,
            i1 ↦ 20
          ⟧
        ⟧,
        i2 ↦ ⟦
          φ ↦ Φ.jeo.opcode.invokeinterface,
          i2 ↦ "java/util/stream/Stream",
          i3 ↦ "limit",
          i4 ↦ "(J)Ljava/util/stream/Stream;",
          i5 ↦ Φ.true
        ⟧
      ⟧
    ⟧
  ⟧}
expected:
  - |
    ⟦
      φ ↦ Φ.hone.distill,
      class ↦ "Foo",
      bridge-input ↦ "Ljava/lang/Object;",
      bridge-output ↦ "Ljava/lang/Object;",
      start ↦ "limit",
      accepted ↦ "Ljava/lang/Object;",
      returned ↦ "Ljava/lang/Object;",
      static ↦ "true",
      captures ↦ ⟦
        c0 ↦ ⟦
          φ ↦ Φ.hone.capture,
          type ↦ "[J",
          count ↦ 20,
          init ↦ ⟦
            k0-iconst-1 ↦ ⟦ φ ↦ Φ.jeo.opcode.iconst_1 ⟧,
            k1-newarray ↦ ⟦
              φ ↦ Φ.jeo.opcode.newarray,
              i1 ↦ "long"
            ⟧
          ⟧
        ⟧
      ⟧,
      emit-shape ↦ "driver",
      body ↦ ⟦
        b0-emit ↦ ⟦ φ ↦ Φ.hone.emit, emit-context ↦ "top-level" ⟧
      ⟧
    ⟧
