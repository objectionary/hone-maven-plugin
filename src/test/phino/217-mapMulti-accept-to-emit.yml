---
# yamllint disable rule:line-length
# After 215 inlines the mapMulti user lambda, 217 rewrites every
# (aload <consumer>, aload <item>, invokeinterface Consumer.accept(Object)V)
# triple in the resulting distill body to (aload <item>, Φ.hone.emit).
# This fixture chains 215 and 217 on a class with two accept calls in
# the user lambda body — both must be rewritten on phino's fixed-point
# loop.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/215-mapMulti-to-distill.phr
  - src/main/resources/org/eolang/hone/rules/streams/217-mapMulti-accept-to-emit.phr
input: |
  {⟦
    j$Foo ↦ ⟦
      φ ↦ Φ.jeo.class,
      version ↦ 65,
      access ↦ 33,
      name ↦ "Foo",
      jm$caller ↦ ⟦
        φ ↦ Φ.jeo.method,
        name ↦ "main",
        body ↦ ⟦
          φ ↦ Φ.jeo.seq.of1,
          t0-site ↦ ⟦
            φ ↦ Φ.hone.lambda,
            class ↦ "Foo",
            method ↦ "accept",
            interface ↦ "()Ljava/util/function/BiConsumer;",
            lambda-signature ↦ "(Ljava/lang/Object;Ljava/lang/Object;)V",
            bridge-signature ↦ "(Ljava/lang/Integer;Ljava/util/function/Consumer;)V",
            static ↦ "true",
            opcode ↦ "invokestatic",
            target ↦ ⟦
              handle ↦ 6,
              class ↦ "Foo",
              method ↦ "lambda$main$0",
              signature ↦ "(Ljava/lang/Integer;Ljava/util/function/Consumer;)V",
              is-interface ↦ Φ.false
            ⟧,
            stream ↦ ⟦
              class ↦ "java/util/stream/Stream",
              method ↦ "mapMulti",
              signature ↦ "(Ljava/util/function/BiConsumer;)Ljava/util/stream/Stream;"
            ⟧
          ⟧
        ⟧
      ⟧,
      jm$lambda ↦ ⟦
        φ ↦ Φ.jeo.method,
        access ↦ 4106,
        name ↦ "lambda$main$0",
        descriptor ↦ "(Ljava/lang/Integer;Ljava/util/function/Consumer;)V",
        body ↦ ⟦
          φ ↦ Φ.jeo.seq.of7,
          i0 ↦ ⟦ φ ↦ Φ.jeo.opcode.aload, v0 ↦ 1 ⟧,
          i1 ↦ ⟦ φ ↦ Φ.jeo.opcode.aload, v0 ↦ 0 ⟧,
          i2 ↦ ⟦
            φ ↦ Φ.jeo.opcode.invokeinterface,
            v0 ↦ "java/util/function/Consumer",
            v1 ↦ "accept",
            v2 ↦ "(Ljava/lang/Object;)V",
            v3 ↦ Φ.true
          ⟧,
          i3 ↦ ⟦ φ ↦ Φ.jeo.opcode.aload, v0 ↦ 1 ⟧,
          i4 ↦ ⟦ φ ↦ Φ.jeo.opcode.aload, v0 ↦ 0 ⟧,
          i5 ↦ ⟦
            φ ↦ Φ.jeo.opcode.invokeinterface,
            v0 ↦ "java/util/function/Consumer",
            v1 ↦ "accept",
            v2 ↦ "(Ljava/lang/Object;)V",
            v3 ↦ Φ.true
          ⟧,
          i6 ↦ ⟦ φ ↦ Φ.jeo.opcode.return ⟧
        ⟧
      ⟧
    ⟧
  ⟧}
expected:
  - |
    ⟦
      φ ↦ Φ.hone.distill,
      class ↦ "Foo",
      bridge-input ↦ "Ljava/lang/Object;",
      bridge-output ↦ "Ljava/lang/Object;",
      start ↦ "mapMulti",
      accepted ↦ "Ljava/lang/Integer;",
      returned ↦ "Ljava/lang/Object;",
      static ↦ "true",
      captures ↦ ⟦ ρ ↦ ∅ ⟧,
      emit-shape ↦ "cps",
      body ↦ 𝑒-body
    ⟧
  - |
    ⟦
      φ ↦ Φ.hone.emit,
      emit-context ↦ "top-level"
    ⟧
