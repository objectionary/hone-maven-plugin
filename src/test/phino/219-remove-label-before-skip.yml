---
# yamllint disable rule:line-length
# An own-line `.skip(n)` disassembles to `count-push, label, skip-call` once
# 151 has dropped the line-number. This rule removes that one wedged label so
# the push sits immediately before the call (220 then recognises the pair).
# The match is scoped to the `push; label; Stream.skip(J)` shape, so it never
# touches a method-entry or try-catch label, which never falls between the two
# opcodes of a single skip expression. The closed body pattern confirms the
# label is gone and the push now directly precedes the skip call.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/2xx/219-remove-label-before-skip.phr
input: |
  {⟦
    body ↦ ⟦
      i1 ↦ ⟦ φ ↦ Φ.jeo.opcode.ldc, v0 ↦ ⟦ φ ↦ Φ.jeo.long, n0 ↦ 2 ⟧ ⟧,
      l1 ↦ ⟦ φ ↦ Φ.jeo.label, v0 ↦ "L1" ⟧,
      i2 ↦ ⟦
        φ ↦ Φ.jeo.opcode.invokeinterface,
        v0 ↦ "java/util/stream/Stream",
        v1 ↦ "skip",
        v2 ↦ "(J)Ljava/util/stream/Stream;",
        v3 ↦ Φ.true
      ⟧,
      ρ ↦ ∅
    ⟧
  ⟧}
expected:
  - ⟦ 𝜏-push ↦ ⟦ φ ↦ Φ.jeo.opcode.ldc, 𝐵-push ⟧, 𝜏-call ↦ ⟦ φ ↦ Φ.jeo.opcode.invokeinterface, v0 ↦ "java/util/stream/Stream", 𝐵-call ⟧, ρ ↦ ∅ ⟧
