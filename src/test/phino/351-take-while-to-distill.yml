---
# yamllint disable rule:line-length
# 351-take-while-to-distill folds Φ.hone.take-while into a cps Φ.hone.distill
# with one boolean[1] capture. The capture's `init` carries the two
# state-init opcodes (iconst_1 + newarray boolean); 502b emits them in the
# caller body. The cps body astores the entry item, checks the gate,
# tests the predicate, and either reaches Φ.hone.emit on the accept path
# or sets the gate and returns on the reject path.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/351-take-while-to-distill.phr
input: |
  {⟦
    φ ↦ Φ.jeo.class,
    version ↦ 66,
    access ↦ 33,
    name ↦ "Foo",
    supername ↦ "java/lang/Object",
    main ↦ ⟦
      φ ↦ Φ.jeo.method,
      access ↦ 4096,
      name ↦ "main",
      descriptor ↦ "()V",
      body ↦ ⟦
        i1 ↦ ⟦
          φ ↦ Φ.hone.take-while,
          opcode ↦ "invokestatic",
          class ↦ "Foo",
          bridge-signature ↦ "(Ljava/lang/Integer;)Z",
          static ↦ "true",
          target ↦ ⟦
            handle ↦ 6,
            class ↦ "Foo",
            method ↦ "lambda$0",
            signature ↦ "(Ljava/lang/Integer;)Z",
            is-interface ↦ Φ.false
          ⟧
        ⟧
      ⟧
    ⟧
  ⟧}
expected:
  - |
    ⟦
      φ ↦ Φ.hone.distill,
      class ↦ "Foo",
      bridge-input ↦ "Ljava/lang/Object;",
      bridge-output ↦ "Ljava/lang/Object;",
      start ↦ "take-while",
      accepted ↦ "Ljava/lang/Object;",
      returned ↦ "Ljava/lang/Object;",
      static ↦ "true",
      captures ↦ ⟦
        c0 ↦ ⟦
          φ ↦ Φ.hone.capture,
          type ↦ "[Z",
          init ↦ 𝑒-init
        ⟧,
        ρ ↦ ∅
      ⟧,
      emit-shape ↦ "cps",
      body ↦ 𝑒-body
    ⟧
  - |
    ⟦ φ ↦ Φ.hone.emit ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.invokestatic,
      i2 ↦ "Foo",
      i3 ↦ "lambda$0",
      i4 ↦ "(Ljava/lang/Integer;)Z",
      i5 ↦ Φ.false
    ⟧
  - |
    ⟦ φ ↦ Φ.jeo.opcode.newarray, i1 ↦ 4 ⟧
