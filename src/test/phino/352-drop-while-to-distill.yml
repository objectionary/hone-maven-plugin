---
# yamllint disable rule:line-length
# 352-drop-while-to-distill mirrors 351 but inverts the branch:
# gate-set → accept, gate-clear + predicate-true → drop,
# gate-clear + predicate-false → set-gate-and-emit (falls through to accept).
rules:
  - src/main/resources/org/eolang/hone/rules/streams/352-drop-while-to-distill.phr
input: |
  {⟦
    φ ↦ Φ.jeo.class,
    version ↦ 66,
    access ↦ 33,
    name ↦ "Foo",
    supername ↦ "java/lang/Object",
    main ↦ ⟦
      φ ↦ Φ.jeo.method,
      access ↦ 4096,
      name ↦ "main",
      descriptor ↦ "()V",
      body ↦ ⟦
        i1 ↦ ⟦
          φ ↦ Φ.hone.drop-while,
          opcode ↦ "invokestatic",
          class ↦ "Foo",
          bridge-signature ↦ "(Ljava/lang/Integer;)Z",
          static ↦ "true",
          target ↦ ⟦
            handle ↦ 6,
            class ↦ "Foo",
            method ↦ "lambda$0",
            signature ↦ "(Ljava/lang/Integer;)Z",
            is-interface ↦ Φ.false
          ⟧
        ⟧
      ⟧
    ⟧
  ⟧}
expected:
  - |
    ⟦
      φ ↦ Φ.hone.distill,
      class ↦ "Foo",
      bridge-input ↦ "Ljava/lang/Object;",
      bridge-output ↦ "Ljava/lang/Object;",
      start ↦ "drop-while",
      accepted ↦ "Ljava/lang/Object;",
      returned ↦ "Ljava/lang/Object;",
      static ↦ "true",
      captures ↦ ⟦
        c0 ↦ ⟦
          φ ↦ Φ.hone.capture,
          type ↦ "[Z",
          init ↦ 𝑒-init
        ⟧,
        ρ ↦ ∅
      ⟧,
      emit-shape ↦ "cps",
      body ↦ 𝑒-body
    ⟧
  - |
    ⟦ φ ↦ Φ.hone.emit, emit-context ↦ "top-level" ⟧
