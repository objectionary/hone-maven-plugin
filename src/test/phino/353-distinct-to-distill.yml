---
# yamllint disable rule:line-length
# 353-distinct-to-distill folds Φ.hone.distinct into a cps Φ.hone.distill
# with exactly one HashSet capture. The capture's `init` carries the three
# state-init opcodes (new + dup + invokespecial); the body operates on
# top-of-stack item with a Φ.hone.emit marker between HashSet.add and the
# skip-and-pop branch. No raw bytecode for the HashSet appears in the
# caller body at this stage — that happens in 502.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/353-distinct-to-distill.phr
input: |
  {⟦
    φ ↦ Φ.jeo.class,
    version ↦ 66,
    access ↦ 33,
    name ↦ "Foo",
    supername ↦ "java/lang/Object",
    main ↦ ⟦
      φ ↦ Φ.jeo.method,
      access ↦ 4096,
      name ↦ "main",
      descriptor ↦ "()V",
      body ↦ ⟦
        i1 ↦ ⟦
          φ ↦ Φ.hone.distinct,
          stream-class ↦ "java/util/stream/Stream"
        ⟧
      ⟧
    ⟧
  ⟧}
expected:
  - |
    ⟦
      φ ↦ Φ.hone.distill,
      class ↦ "Foo",
      bridge-input ↦ "Ljava/lang/Object;",
      bridge-output ↦ "Ljava/lang/Object;",
      start ↦ "distinct",
      accepted ↦ "Ljava/lang/Object;",
      returned ↦ "Ljava/lang/Object;",
      static ↦ "true",
      captures ↦ ⟦
        c0 ↦ ⟦
          φ ↦ Φ.hone.capture,
          type ↦ "Ljava/util/HashSet;",
          init ↦ 𝑒-init-formation
        ⟧,
        ρ ↦ ∅
      ⟧,
      emit-shape ↦ "cps",
      body ↦ 𝑒-body
    ⟧
  - |
    ⟦
      φ ↦ Φ.hone.emit
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.invokevirtual,
      i2 ↦ "java/util/HashSet",
      i3 ↦ "add",
      i4 ↦ "(Ljava/lang/Object;)Z",
      i5 ↦ Φ.false
    ⟧
