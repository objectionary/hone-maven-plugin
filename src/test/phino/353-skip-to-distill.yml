---
# yamllint disable rule:line-length
# 353-skip-to-distill folds Φ.hone.skip (object Stream variant with a
# Φ.number count) into a cps Φ.hone.distill with one long[1] capture
# and a body that counts up from 0 to N — counter[0] < N drops and
# increments, counter[0] >= N emits. The capture's init carries the
# canonical three-opcode pattern (nop + iconst_1 + newarray long) so
# 502b lowers it without a new variant. N is inlined into the body via
# ldc Φ.jeo.long(N), and the increment path uses ladd + lastore.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/353-skip-to-distill.phr
input: |
  {⟦
    φ ↦ Φ.jeo.class,
    version ↦ 66,
    access ↦ 33,
    name ↦ "Foo",
    supername ↦ "java/lang/Object",
    main ↦ ⟦
      φ ↦ Φ.jeo.method,
      access ↦ 4096,
      name ↦ "main",
      descriptor ↦ "()V",
      body ↦ ⟦
        i1 ↦ ⟦
          φ ↦ Φ.hone.skip,
          stream-class ↦ "java/util/stream/Stream",
          count ↦ 5
        ⟧
      ⟧
    ⟧
  ⟧}
expected:
  - |
    ⟦
      φ ↦ Φ.hone.distill,
      class ↦ "Foo",
      bridge-input ↦ "Ljava/lang/Object;",
      bridge-output ↦ "Ljava/lang/Object;",
      start ↦ "skip",
      accepted ↦ "Ljava/lang/Object;",
      returned ↦ "Ljava/lang/Object;",
      static ↦ "true",
      captures ↦ ⟦
        c0 ↦ ⟦
          φ ↦ Φ.hone.capture,
          type ↦ "[J",
          init ↦ 𝑒-init
        ⟧,
        ρ ↦ ∅
      ⟧,
      emit-shape ↦ "cps",
      body ↦ 𝑒-body
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.newarray,
      i1 ↦ 11
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.ldc,
      i1 ↦ ⟦
        φ ↦ Φ.jeo.long,
        i1 ↦ 5
      ⟧
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.lcmp
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.ladd
    ⟧
  - |
    ⟦ φ ↦ Φ.hone.emit, emit-context ↦ "top-level" ⟧
