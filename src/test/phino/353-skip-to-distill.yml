---
# yamllint disable rule:line-length
# 353 folds Φ.hone.skip (with Φ.number count) into a cps Φ.hone.distill
# carrying one long[1] capture. The capture's init holds the six-opcode
# counter-allocation sequence (iconst_1 + newarray long + dup + iconst_0
# + ldc Φ.jeo.long(N) + lastore); the cps body astores the entry item,
# decrements the counter while > 0 (drops the element with a return),
# or reaches Φ.hone.emit on the accept branch.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/353-skip-to-distill.phr
input: |
  {⟦
    φ ↦ Φ.jeo.class,
    version ↦ 66,
    access ↦ 33,
    name ↦ "Foo",
    supername ↦ "java/lang/Object",
    main ↦ ⟦
      φ ↦ Φ.jeo.method,
      access ↦ 4096,
      name ↦ "main",
      descriptor ↦ "()V",
      body ↦ ⟦
        i1 ↦ ⟦
          φ ↦ Φ.hone.skip,
          stream-class ↦ "java/util/stream/Stream",
          count ↦ 5
        ⟧
      ⟧
    ⟧
  ⟧}
expected:
  - |
    ⟦
      φ ↦ Φ.hone.distill,
      class ↦ "Foo",
      bridge-input ↦ "Ljava/lang/Object;",
      bridge-output ↦ "Ljava/lang/Object;",
      start ↦ "skip",
      accepted ↦ "Ljava/lang/Object;",
      returned ↦ "Ljava/lang/Object;",
      static ↦ "true",
      captures ↦ ⟦
        c0 ↦ ⟦
          φ ↦ Φ.hone.capture,
          type ↦ "[J",
          init ↦ 𝑒-init
        ⟧,
        ρ ↦ ∅
      ⟧,
      emit-shape ↦ "cps",
      body ↦ 𝑒-body
    ⟧
  - |
    ⟦ φ ↦ Φ.hone.emit ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.ldc,
      i1 ↦ ⟦
        φ ↦ Φ.jeo.long,
        i1 ↦ 5
      ⟧
    ⟧
  - |
    ⟦ φ ↦ Φ.jeo.opcode.lcmp ⟧
  - |
    ⟦ φ ↦ Φ.jeo.opcode.lsub ⟧
