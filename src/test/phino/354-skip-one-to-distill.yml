---
# yamllint disable rule:line-length
# 354 is the .skip(1L) sibling of 353: Φ.hone.skip with count="1"
# (the string-typed form produced when javac emitted lconst_1) folds
# into the same cps Φ.hone.distill as 353-skip, but the capture's
# init uses lconst_1 instead of ldc Φ.jeo.long(N).
rules:
  - src/main/resources/org/eolang/hone/rules/streams/354-skip-one-to-distill.phr
input: |
  {⟦
    φ ↦ Φ.jeo.class,
    version ↦ 66,
    access ↦ 33,
    name ↦ "Foo",
    supername ↦ "java/lang/Object",
    main ↦ ⟦
      φ ↦ Φ.jeo.method,
      access ↦ 4096,
      name ↦ "main",
      descriptor ↦ "()V",
      body ↦ ⟦
        i1 ↦ ⟦
          φ ↦ Φ.hone.skip,
          stream-class ↦ "java/util/stream/Stream",
          count ↦ "1"
        ⟧
      ⟧
    ⟧
  ⟧}
expected:
  - |
    ⟦
      φ ↦ Φ.hone.distill,
      class ↦ "Foo",
      bridge-input ↦ "Ljava/lang/Object;",
      bridge-output ↦ "Ljava/lang/Object;",
      start ↦ "skip-one",
      accepted ↦ "Ljava/lang/Object;",
      returned ↦ "Ljava/lang/Object;",
      static ↦ "true",
      captures ↦ ⟦
        c0 ↦ ⟦
          φ ↦ Φ.hone.capture,
          type ↦ "[J",
          init ↦ 𝑒-init
        ⟧,
        ρ ↦ ∅
      ⟧,
      emit-shape ↦ "cps",
      body ↦ 𝑒-body
    ⟧
  - |
    ⟦ φ ↦ Φ.hone.emit ⟧
  - |
    ⟦ φ ↦ Φ.jeo.opcode.lconst_1 ⟧
