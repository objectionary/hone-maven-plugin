---
# yamllint disable rule:line-length
# DoubleStream variant of 355-primitive-skip-to-distill: bridge-input /
# bridge-output / accepted / returned all carry "D", the body uses
# dstore to park the wide double in slot 1 and dload to push it back
# before Φ.hone.emit. Like the LongStream case, 502b will widen
# max-locals to 4 because the double takes slots 1+2.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/355-primitive-skip-to-distill.phr
input: |
  {⟦
    φ ↦ Φ.jeo.class,
    version ↦ 66,
    access ↦ 33,
    name ↦ "Foo",
    supername ↦ "java/lang/Object",
    main ↦ ⟦
      φ ↦ Φ.jeo.method,
      access ↦ 4096,
      name ↦ "main",
      descriptor ↦ "()V",
      body ↦ ⟦
        i1 ↦ ⟦
          φ ↦ Φ.hone.primitive-skip,
          stream-class ↦ "java/util/stream/DoubleStream",
          stream-signature ↦ "(J)Ljava/util/stream/DoubleStream;",
          count ↦ 9
        ⟧
      ⟧
    ⟧
  ⟧}
expected:
  - |
    ⟦
      φ ↦ Φ.hone.distill,
      class ↦ "Foo",
      bridge-input ↦ "D",
      bridge-output ↦ "D",
      start ↦ "primitive-skip",
      accepted ↦ "D",
      returned ↦ "D",
      static ↦ "true",
      captures ↦ 𝑒-cap,
      emit-shape ↦ "cps",
      body ↦ 𝑒-body
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.dstore,
      i1 ↦ 1
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.ldc,
      i1 ↦ ⟦
        φ ↦ Φ.jeo.long,
        i1 ↦ 9
      ⟧
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.dload,
      i1 ↦ 1
    ⟧
  - |
    ⟦ φ ↦ Φ.hone.emit ⟧
