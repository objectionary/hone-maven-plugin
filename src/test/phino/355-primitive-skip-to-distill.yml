---
# yamllint disable rule:line-length
# 355-primitive-skip-to-distill is the primitive counterpart of 353:
# Φ.hone.primitive-skip with a Φ.number count is folded into a cps
# Φ.hone.distill with one long[1] capture and a body that counts up
# from 0 to N. Tested here on IntStream — the body must use istore
# for the item store, ldc for the threshold, lcmp+ifge for the branch,
# ladd for the increment, and iload to push the int item to the
# Φ.hone.emit marker.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/355-primitive-skip-to-distill.phr
input: |
  {⟦
    φ ↦ Φ.jeo.class,
    version ↦ 66,
    access ↦ 33,
    name ↦ "Foo",
    supername ↦ "java/lang/Object",
    main ↦ ⟦
      φ ↦ Φ.jeo.method,
      access ↦ 4096,
      name ↦ "main",
      descriptor ↦ "()V",
      body ↦ ⟦
        i1 ↦ ⟦
          φ ↦ Φ.hone.primitive-skip,
          stream-class ↦ "java/util/stream/IntStream",
          stream-signature ↦ "(J)Ljava/util/stream/IntStream;",
          count ↦ 5
        ⟧
      ⟧
    ⟧
  ⟧}
expected:
  - |
    ⟦
      φ ↦ Φ.hone.distill,
      class ↦ "Foo",
      bridge-input ↦ "I",
      bridge-output ↦ "I",
      start ↦ "primitive-skip",
      accepted ↦ "I",
      returned ↦ "I",
      static ↦ "true",
      captures ↦ ⟦
        c0 ↦ ⟦
          φ ↦ Φ.hone.capture,
          type ↦ "[J",
          init ↦ 𝑒-init
        ⟧,
        ρ ↦ ∅
      ⟧,
      emit-shape ↦ "cps",
      body ↦ 𝑒-body
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.newarray,
      i1 ↦ 11
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.istore,
      i1 ↦ 1
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.ldc,
      i1 ↦ ⟦
        φ ↦ Φ.jeo.long,
        i1 ↦ 5
      ⟧
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.lcmp
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.ladd
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.iload,
      i1 ↦ 1
    ⟧
  - |
    ⟦ φ ↦ Φ.hone.emit, emit-context ↦ "top-level" ⟧
