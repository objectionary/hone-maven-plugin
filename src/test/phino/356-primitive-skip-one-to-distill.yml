---
# yamllint disable rule:line-length
# 356-primitive-skip-one-to-distill is the sibling of 355 for
# `.skip(1L)`: Φ.hone.primitive-skip with count="1" folds into the
# same cps Φ.hone.distill shape but uses lconst_1 in place of
# ldc Φ.jeo.long(1). Tested here on IntStream.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/356-primitive-skip-one-to-distill.phr
input: |
  {⟦
    φ ↦ Φ.jeo.class,
    version ↦ 66,
    access ↦ 33,
    name ↦ "Foo",
    supername ↦ "java/lang/Object",
    main ↦ ⟦
      φ ↦ Φ.jeo.method,
      access ↦ 4096,
      name ↦ "main",
      descriptor ↦ "()V",
      body ↦ ⟦
        i1 ↦ ⟦
          φ ↦ Φ.hone.primitive-skip,
          stream-class ↦ "java/util/stream/IntStream",
          stream-signature ↦ "(J)Ljava/util/stream/IntStream;",
          count ↦ "1"
        ⟧
      ⟧
    ⟧
  ⟧}
expected:
  - |
    ⟦
      φ ↦ Φ.hone.distill,
      class ↦ "Foo",
      bridge-input ↦ "I",
      bridge-output ↦ "I",
      start ↦ "primitive-skip-one",
      accepted ↦ "I",
      returned ↦ "I",
      static ↦ "true",
      captures ↦ 𝑒-cap,
      emit-shape ↦ "cps",
      body ↦ 𝑒-body
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.istore,
      i1 ↦ 1
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.lconst_1
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.iload,
      i1 ↦ 1
    ⟧
  - |
    ⟦ φ ↦ Φ.hone.emit ⟧
