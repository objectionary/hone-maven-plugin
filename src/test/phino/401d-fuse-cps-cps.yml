---
# yamllint disable rule:line-length
# Pins the cps+cps fusion path introduced in #570 Step 3. The rule
# fires whenever the merged captures union has cardinality 0 or 1
# (gated by phino's built-in `length:` predicate); this fixture
# exercises the zero-capture corner of that range with a production-
# realistic `filter → filter` adjacency: each cps filter body is
# self-contained (dup + predicate + branch + top-level emit) and
# carries an empty captures group. 401d uses phino's `graft` where-
# function to REPLACE the first filter's emit marker with the second
# filter's body opcodes — at the former emit point the second filter
# sees the about-to-be-emitted item on top of stack, runs its
# predicate gate, and drives downstream emission through its own
# top-level emit marker that survives in the merged body. Both
# bodies use the default `i*` synthetic keys that 3xx-fold rules
# emit in production; graft auto-renames every τ-labelled binding
# inside the grafted copy so duplicate keys are silently resolved
# instead of producing a phino abort.
#
# Two-stateful-cps adjacencies (distinct → takeWhile, takeWhile →
# skip, …) are deliberately NOT exercised: the `length:` guard
# excludes them because no 502* rule lowers multi-capture cps
# today, and an unguarded merge would leak a `Φ.hone.distill`
# past 5xx into jeo:assemble.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/401d-fuse-cps-cps.phr
input: |
  {⟦
    φ ↦ Φ.jeo.class,
    version ↦ 66,
    access ↦ 33,
    name ↦ "Foo",
    supername ↦ "java/lang/Object",
    main ↦ ⟦
      φ ↦ Φ.jeo.method,
      access ↦ 4096,
      name ↦ "main",
      descriptor ↦ "()V",
      body ↦ ⟦
        i1 ↦ ⟦
          φ ↦ Φ.hone.distill,
          class ↦ "Foo",
          bridge-input ↦ "Ljava/lang/Object;",
          bridge-output ↦ "Ljava/lang/Object;",
          start ↦ "filter",
          accepted ↦ "Ljava/lang/Object;",
          returned ↦ "Ljava/lang/Object;",
          static ↦ "true",
          captures ↦ ⟦ ρ ↦ ∅ ⟧,
          emit-shape ↦ "cps",
          body ↦ ⟦
            i1 ↦ ⟦ φ ↦ Φ.jeo.opcode.dup ⟧,
            i2 ↦ ⟦
              φ ↦ Φ.jeo.opcode.invokestatic,
              i2 ↦ "Foo",
              i3 ↦ "lambda$0",
              i4 ↦ "(Ljava/lang/Object;)Z",
              i5 ↦ Φ.false
            ⟧,
            i3 ↦ ⟦
              φ ↦ Φ.jeo.opcode.ifeq,
              i2 ↦ ⟦ φ ↦ Φ.jeo.label, i1 ↦ "Lreject1" ⟧
            ⟧,
            i4 ↦ ⟦ φ ↦ Φ.hone.emit, emit-context ↦ "top-level" ⟧,
            i5 ↦ ⟦
              φ ↦ Φ.jeo.opcode.goto,
              i2 ↦ ⟦ φ ↦ Φ.jeo.label, i1 ↦ "Lend1" ⟧
            ⟧,
            i6 ↦ ⟦ φ ↦ Φ.jeo.label, i1 ↦ "Lreject1" ⟧,
            i7 ↦ ⟦ φ ↦ Φ.jeo.opcode.pop ⟧,
            i8 ↦ ⟦ φ ↦ Φ.jeo.label, i1 ↦ "Lend1" ⟧
          ⟧
        ⟧,
        i2 ↦ ⟦
          φ ↦ Φ.hone.distill,
          class ↦ "Foo",
          bridge-input ↦ "Ljava/lang/Object;",
          bridge-output ↦ "Ljava/lang/Object;",
          start ↦ "filter",
          accepted ↦ "Ljava/lang/Object;",
          returned ↦ "Ljava/lang/Object;",
          static ↦ "true",
          captures ↦ ⟦ ρ ↦ ∅ ⟧,
          emit-shape ↦ "cps",
          body ↦ ⟦
            i1 ↦ ⟦ φ ↦ Φ.jeo.opcode.dup ⟧,
            i2 ↦ ⟦
              φ ↦ Φ.jeo.opcode.invokestatic,
              i2 ↦ "Foo",
              i3 ↦ "lambda$1",
              i4 ↦ "(Ljava/lang/Object;)Z",
              i5 ↦ Φ.false
            ⟧,
            i3 ↦ ⟦
              φ ↦ Φ.jeo.opcode.ifeq,
              i2 ↦ ⟦ φ ↦ Φ.jeo.label, i1 ↦ "Lreject2" ⟧
            ⟧,
            i4 ↦ ⟦ φ ↦ Φ.hone.emit, emit-context ↦ "top-level" ⟧,
            i5 ↦ ⟦
              φ ↦ Φ.jeo.opcode.goto,
              i2 ↦ ⟦ φ ↦ Φ.jeo.label, i1 ↦ "Lend2" ⟧
            ⟧,
            i6 ↦ ⟦ φ ↦ Φ.jeo.label, i1 ↦ "Lreject2" ⟧,
            i7 ↦ ⟦ φ ↦ Φ.jeo.opcode.pop ⟧,
            i8 ↦ ⟦ φ ↦ Φ.jeo.label, i1 ↦ "Lend2" ⟧
          ⟧
        ⟧
      ⟧
    ⟧
  ⟧}
expected:
  - |
    ⟦
      φ ↦ Φ.hone.distill,
      class ↦ "Foo",
      bridge-input ↦ "Ljava/lang/Object;",
      bridge-output ↦ "Ljava/lang/Object;",
      start ↦ "filter",
      accepted ↦ "Ljava/lang/Object;",
      returned ↦ "Ljava/lang/Object;",
      static ↦ "true",
      captures ↦ ⟦ ρ ↦ ∅ ⟧,
      emit-shape ↦ "cps",
      body ↦ ⟦ 𝐵-fused-body, ρ ↦ ∅ ⟧
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.invokestatic,
      i2 ↦ "Foo",
      i3 ↦ "lambda$0",
      i4 ↦ "(Ljava/lang/Object;)Z",
      i5 ↦ Φ.false
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.invokestatic,
      i2 ↦ "Foo",
      i3 ↦ "lambda$1",
      i4 ↦ "(Ljava/lang/Object;)Z",
      i5 ↦ Φ.false
    ⟧
  - |
    ⟦ φ ↦ Φ.hone.emit, emit-context ↦ "top-level" ⟧
