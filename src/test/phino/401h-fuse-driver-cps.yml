---
# yamllint disable rule:line-length
# Pins the driver+cps fusion path introduced in #570 Step 7a. The rule
# fires whenever a driver-shape distill (here: a 216-shape limit driver
# with one long[1] counter capture and one placeholder top-level
# Φ.hone.emit marker) sits adjacent to a cps-shape distill (here: a
# filter cps body with self-contained dup + predicate + branch + top-
# level emit). 401h uses phino's `splice` where-function to insert the
# cps body in front of every top-level emit marker in the driver body
# — at the former emit point the cps body runs against the about-to-be-
# emitted item, applies its gate, and drives downstream emission
# through its own surviving top-level emit marker. The driver's
# original placeholder marker also survives in the merged body, ready
# for further fusion or for the driver lowering pathway to interpret
# according to the driver's own emit-context contract.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/401h-fuse-driver-cps.phr
input: |
  {⟦
    φ ↦ Φ.jeo.class,
    version ↦ 66,
    access ↦ 33,
    name ↦ "Foo",
    supername ↦ "java/lang/Object",
    main ↦ ⟦
      φ ↦ Φ.jeo.method,
      access ↦ 4096,
      name ↦ "main",
      descriptor ↦ "()V",
      body ↦ ⟦
        t1 ↦ ⟦
          φ ↦ Φ.hone.distill,
          class ↦ "Foo",
          bridge-input ↦ "Ljava/lang/Object;",
          bridge-output ↦ "Ljava/lang/Object;",
          start ↦ "limit",
          accepted ↦ "Ljava/lang/Object;",
          returned ↦ "Ljava/lang/Object;",
          static ↦ "true",
          captures ↦ ⟦
            c0 ↦ ⟦
              φ ↦ Φ.hone.capture,
              type ↦ "[J",
              count ↦ 10,
              init ↦ ⟦
                k0-iconst-1 ↦ ⟦ φ ↦ Φ.jeo.opcode.iconst_1 ⟧,
                k1-newarray ↦ ⟦
                  φ ↦ Φ.jeo.opcode.newarray,
                  i1 ↦ "long"
                ⟧
              ⟧
            ⟧
          ⟧,
          emit-shape ↦ "driver",
          body ↦ ⟦
            b0-emit ↦ ⟦ φ ↦ Φ.hone.emit, emit-context ↦ "top-level" ⟧
          ⟧
        ⟧,
        t2 ↦ ⟦
          φ ↦ Φ.hone.distill,
          class ↦ "Foo",
          bridge-input ↦ "Ljava/lang/Object;",
          bridge-output ↦ "Ljava/lang/Object;",
          start ↦ "filter",
          accepted ↦ "Ljava/lang/Object;",
          returned ↦ "Ljava/lang/Object;",
          static ↦ "true",
          captures ↦ ⟦ ρ ↦ ∅ ⟧,
          emit-shape ↦ "cps",
          body ↦ ⟦
            u1 ↦ ⟦ φ ↦ Φ.jeo.opcode.dup ⟧,
            u2 ↦ ⟦
              φ ↦ Φ.jeo.opcode.invokestatic,
              i2 ↦ "Foo",
              i3 ↦ "lambda$0",
              i4 ↦ "(Ljava/lang/Object;)Z",
              i5 ↦ Φ.false
            ⟧,
            u3 ↦ ⟦
              φ ↦ Φ.jeo.opcode.ifeq,
              i2 ↦ ⟦ φ ↦ Φ.jeo.label, i1 ↦ "Lreject" ⟧
            ⟧,
            u4 ↦ ⟦ φ ↦ Φ.hone.emit, emit-context ↦ "top-level" ⟧,
            u5 ↦ ⟦
              φ ↦ Φ.jeo.opcode.goto,
              i2 ↦ ⟦ φ ↦ Φ.jeo.label, i1 ↦ "Lend" ⟧
            ⟧,
            u6 ↦ ⟦ φ ↦ Φ.jeo.label, i1 ↦ "Lreject" ⟧,
            u7 ↦ ⟦ φ ↦ Φ.jeo.opcode.pop ⟧,
            u8 ↦ ⟦ φ ↦ Φ.jeo.label, i1 ↦ "Lend" ⟧
          ⟧
        ⟧
      ⟧
    ⟧
  ⟧}
expected:
  - |
    ⟦
      φ ↦ Φ.hone.distill,
      class ↦ "Foo",
      bridge-input ↦ "Ljava/lang/Object;",
      bridge-output ↦ "Ljava/lang/Object;",
      start ↦ "limit",
      accepted ↦ "Ljava/lang/Object;",
      returned ↦ "Ljava/lang/Object;",
      static ↦ "true",
      captures ↦ ⟦ 𝐵-merged-captures, ρ ↦ ∅ ⟧,
      emit-shape ↦ "driver",
      body ↦ ⟦ 𝐵-fused-body, ρ ↦ ∅ ⟧
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.invokestatic,
      i2 ↦ "Foo",
      i3 ↦ "lambda$0",
      i4 ↦ "(Ljava/lang/Object;)Z",
      i5 ↦ Φ.false
    ⟧
