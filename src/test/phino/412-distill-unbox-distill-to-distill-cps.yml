---
# yamllint disable rule:line-length
# Step 7b widening: 412 fuses an auto first distill, a Φ.hone.unbox, and
# a cps second distill into a single cps distill. The fused distill
# keeps the first distill's Object bridge-input and the second
# distill's primitive bridge-output / returned and `cps` emit-shape;
# the second distill's captures (empty here, a filter-shape) propagate
# through. The unbox's intValue invocation is spliced between the two
# original bodies and the cps body's emit marker survives at top level
# in the merged body for downstream lowering by 491 / 502*.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/412-distill-unbox-distill-to-distill.phr
input: |
  {⟦
    φ ↦ Φ.jeo.class,
    version ↦ 66,
    access ↦ 33,
    name ↦ "Foo",
    supername ↦ "java/lang/Object",
    main ↦ ⟦
      φ ↦ Φ.jeo.method,
      access ↦ 4096,
      name ↦ "main",
      descriptor ↦ "()V",
      body ↦ ⟦
        i1 ↦ ⟦
          φ ↦ Φ.hone.distill,
          class ↦ "Foo",
          bridge-input ↦ "Ljava/lang/Object;",
          bridge-output ↦ "Ljava/lang/Integer;",
          start ↦ "map",
          accepted ↦ "Ljava/lang/Object;",
          returned ↦ "Ljava/lang/Object;",
          static ↦ "true",
          captures ↦ ⟦ ρ ↦ ∅ ⟧,
          emit-shape ↦ "auto",
          body ↦ ⟦
            a1 ↦ ⟦
              φ ↦ Φ.jeo.opcode.invokestatic,
              i2 ↦ "Foo",
              i3 ↦ "lambda$0",
              i4 ↦ "(Ljava/lang/Object;)Ljava/lang/Object;",
              i5 ↦ Φ.false
            ⟧
          ⟧
        ⟧,
        i2 ↦ ⟦
          φ ↦ Φ.hone.unbox,
          opcode ↦ "invokevirtual",
          class ↦ "Foo",
          bridge-signature ↦ "(Ljava/lang/Integer;)I",
          static ↦ "true",
          target ↦ ⟦
            handle ↦ 5,
            class ↦ "java/lang/Integer",
            method ↦ "intValue",
            signature ↦ "()I",
            is-interface ↦ Φ.false
          ⟧
        ⟧,
        i3 ↦ ⟦
          φ ↦ Φ.hone.distill,
          class ↦ "Foo",
          bridge-input ↦ "I",
          bridge-output ↦ "I",
          start ↦ "filter",
          accepted ↦ "I",
          returned ↦ "I",
          static ↦ "true",
          captures ↦ ⟦ ρ ↦ ∅ ⟧,
          emit-shape ↦ "cps",
          body ↦ ⟦
            b1 ↦ ⟦ φ ↦ Φ.jeo.opcode.dup ⟧,
            b2 ↦ ⟦
              φ ↦ Φ.jeo.opcode.invokestatic,
              i2 ↦ "Foo",
              i3 ↦ "lambda$1",
              i4 ↦ "(I)Z",
              i5 ↦ Φ.false
            ⟧,
            b3 ↦ ⟦
              φ ↦ Φ.jeo.opcode.ifeq,
              i2 ↦ ⟦ φ ↦ Φ.jeo.label, i1 ↦ "Lreject" ⟧
            ⟧,
            b4 ↦ ⟦ φ ↦ Φ.hone.emit, emit-context ↦ "top-level" ⟧,
            b5 ↦ ⟦
              φ ↦ Φ.jeo.opcode.goto,
              i2 ↦ ⟦ φ ↦ Φ.jeo.label, i1 ↦ "Lend" ⟧
            ⟧,
            b6 ↦ ⟦ φ ↦ Φ.jeo.label, i1 ↦ "Lreject" ⟧,
            b7 ↦ ⟦ φ ↦ Φ.jeo.opcode.pop ⟧,
            b8 ↦ ⟦ φ ↦ Φ.jeo.label, i1 ↦ "Lend" ⟧
          ⟧
        ⟧
      ⟧
    ⟧
  ⟧}
expected:
  - |
    ⟦
      φ ↦ Φ.hone.distill,
      class ↦ "Foo",
      bridge-input ↦ "Ljava/lang/Object;",
      bridge-output ↦ "I",
      start ↦ "map",
      accepted ↦ "Ljava/lang/Object;",
      returned ↦ "I",
      static ↦ "true",
      captures ↦ ⟦ ρ ↦ ∅ ⟧,
      emit-shape ↦ "cps",
      body ↦ 𝑒-fused-body
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.invokestatic,
      i2 ↦ "Foo",
      i3 ↦ "lambda$0",
      i4 ↦ "(Ljava/lang/Object;)Ljava/lang/Object;",
      i5 ↦ Φ.false
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.invokevirtual,
      i2 ↦ "java/lang/Integer",
      i3 ↦ "intValue",
      i4 ↦ "()I",
      i5 ↦ Φ.false
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.invokestatic,
      i2 ↦ "Foo",
      i3 ↦ "lambda$1",
      i4 ↦ "(I)Z",
      i5 ↦ Φ.false
    ⟧
  - |
    ⟦ φ ↦ Φ.hone.emit, emit-context ↦ "top-level" ⟧
