---
# yamllint disable rule:line-length
# Step 7b widening: 413 fuses an auto first distill, a Φ.hone.box, and
# a cps second distill into a single cps distill. The fused distill
# keeps the first distill's primitive bridge-input and the second
# distill's reference bridge-output / returned and `cps` emit-shape;
# the second distill's captures (empty here, a filter-shape)
# propagate through. The box's invokestatic is spliced between the
# two original bodies and the cps body's emit marker survives at top
# level in the merged body for downstream lowering by 491 / 502*.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/413-distill-box-distill-to-distill.phr
input: |
  {⟦
    φ ↦ Φ.jeo.class,
    version ↦ 66,
    access ↦ 33,
    name ↦ "Foo",
    supername ↦ "java/lang/Object",
    main ↦ ⟦
      φ ↦ Φ.jeo.method,
      access ↦ 4096,
      name ↦ "main",
      descriptor ↦ "()V",
      body ↦ ⟦
        i1 ↦ ⟦
          φ ↦ Φ.hone.distill,
          class ↦ "Foo",
          bridge-input ↦ "I",
          bridge-output ↦ "I",
          start ↦ "filter",
          accepted ↦ "I",
          returned ↦ "I",
          static ↦ "true",
          captures ↦ ⟦ ρ ↦ ∅ ⟧,
          emit-shape ↦ "auto",
          body ↦ ⟦
            a1 ↦ ⟦
              φ ↦ Φ.jeo.opcode.invokestatic,
              i2 ↦ "Foo",
              i3 ↦ "lambda$0",
              i4 ↦ "(I)Z",
              i5 ↦ Φ.false
            ⟧
          ⟧
        ⟧,
        i2 ↦ ⟦
          φ ↦ Φ.hone.box,
          opcode ↦ "invokestatic",
          class ↦ "Foo",
          stream-class ↦ "java/util/stream/IntStream",
          bridge-signature ↦ "(I)Ljava/lang/String;",
          static ↦ "true",
          target ↦ ⟦
            handle ↦ 6,
            class ↦ "Foo",
            method ↦ "lambda$1",
            signature ↦ "(I)Ljava/lang/String;",
            is-interface ↦ Φ.false
          ⟧
        ⟧,
        i3 ↦ ⟦
          φ ↦ Φ.hone.distill,
          class ↦ "Foo",
          bridge-input ↦ "Ljava/lang/String;",
          bridge-output ↦ "Ljava/lang/String;",
          start ↦ "filter",
          accepted ↦ "Ljava/lang/String;",
          returned ↦ "Ljava/lang/String;",
          static ↦ "true",
          captures ↦ ⟦ ρ ↦ ∅ ⟧,
          emit-shape ↦ "cps",
          body ↦ ⟦
            b1 ↦ ⟦ φ ↦ Φ.jeo.opcode.dup ⟧,
            b2 ↦ ⟦
              φ ↦ Φ.jeo.opcode.invokestatic,
              i2 ↦ "Foo",
              i3 ↦ "lambda$2",
              i4 ↦ "(Ljava/lang/String;)Z",
              i5 ↦ Φ.false
            ⟧,
            b3 ↦ ⟦
              φ ↦ Φ.jeo.opcode.ifeq,
              i2 ↦ ⟦ φ ↦ Φ.jeo.label, i1 ↦ "Lreject" ⟧
            ⟧,
            b4 ↦ ⟦ φ ↦ Φ.hone.emit, emit-context ↦ "top-level" ⟧,
            b5 ↦ ⟦
              φ ↦ Φ.jeo.opcode.goto,
              i2 ↦ ⟦ φ ↦ Φ.jeo.label, i1 ↦ "Lend" ⟧
            ⟧,
            b6 ↦ ⟦ φ ↦ Φ.jeo.label, i1 ↦ "Lreject" ⟧,
            b7 ↦ ⟦ φ ↦ Φ.jeo.opcode.pop ⟧,
            b8 ↦ ⟦ φ ↦ Φ.jeo.label, i1 ↦ "Lend" ⟧
          ⟧
        ⟧
      ⟧
    ⟧
  ⟧}
expected:
  - |
    ⟦
      φ ↦ Φ.hone.distill,
      class ↦ "Foo",
      bridge-input ↦ "I",
      bridge-output ↦ "Ljava/lang/String;",
      start ↦ "filter",
      accepted ↦ "I",
      returned ↦ "Ljava/lang/String;",
      static ↦ "true",
      captures ↦ ⟦ ρ ↦ ∅ ⟧,
      emit-shape ↦ "cps",
      body ↦ 𝑒-fused-body
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.invokestatic,
      i2 ↦ "Foo",
      i3 ↦ "lambda$0",
      i4 ↦ "(I)Z",
      i5 ↦ Φ.false
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.invokestatic,
      i2 ↦ "Foo",
      i3 ↦ "lambda$1",
      i4 ↦ "(I)Ljava/lang/String;",
      i5 ↦ Φ.false
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.invokestatic,
      i2 ↦ "Foo",
      i3 ↦ "lambda$2",
      i4 ↦ "(Ljava/lang/String;)Z",
      i5 ↦ Φ.false
    ⟧
  - |
    ⟦ φ ↦ Φ.hone.emit, emit-context ↦ "top-level" ⟧
