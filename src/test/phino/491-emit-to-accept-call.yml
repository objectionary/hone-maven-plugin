---
# yamllint disable rule:line-length
# 491 lowers a single Φ.hone.emit sentinel inside a cps Φ.hone.distill body
# into the four-opcode triple `aload <consumer-slot>, dup_x1, pop,
# invokeinterface Consumer.accept(Ljava/lang/Object;)V`. The slot layout is
# fixed by the distill's shape: one capture at slot 0, item at slot 1,
# consumer at slot 2.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/491-emit-to-accept-call.phr
input: |
  {⟦
    φ ↦ Φ.hone.distill,
    class ↦ "Foo",
    bridge-input ↦ "Ljava/lang/Object;",
    bridge-output ↦ "Ljava/lang/Object;",
    start ↦ "distinct",
    accepted ↦ "Ljava/lang/Object;",
    returned ↦ "Ljava/lang/Object;",
    static ↦ "true",
    captures ↦ ⟦
      c0 ↦ ⟦
        φ ↦ Φ.hone.capture,
        type ↦ "Ljava/util/HashSet;",
        init ↦ ⟦
          k0 ↦ ⟦ φ ↦ Φ.jeo.opcode.new, i1 ↦ "java/util/HashSet" ⟧
        ⟧
      ⟧
    ⟧,
    emit-shape ↦ "cps",
    body ↦ ⟦
      d0 ↦ ⟦ φ ↦ Φ.jeo.opcode.dup ⟧,
      d1 ↦ ⟦ φ ↦ Φ.hone.emit ⟧,
      d2 ↦ ⟦ φ ↦ Φ.jeo.opcode.pop ⟧
    ⟧
  ⟧}
expected:
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.aload,
      i1 ↦ 2
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.dup_x1
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.invokeinterface,
      i2 ↦ "java/util/function/Consumer",
      i3 ↦ "accept",
      i4 ↦ "(Ljava/lang/Object;)V",
      i5 ↦ Φ.true
    ⟧
