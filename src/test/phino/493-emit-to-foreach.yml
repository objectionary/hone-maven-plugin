---
# yamllint disable rule:line-length
# 493 lowers the Φ.hone.emit marker inside a cps Φ.hone.distill whose
# `start` is "flatMap" into the two opcodes that drive Stream.forEach.
# The slot layout matches 502a's wrapper: item at slot 0 (loaded by the
# wrapper before the body runs), consumer at slot 1.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/493-emit-to-foreach.phr
input: |
  {⟦
    φ ↦ Φ.hone.distill,
    class ↦ "Foo",
    bridge-input ↦ "Ljava/lang/Object;",
    bridge-output ↦ "Ljava/lang/Object;",
    start ↦ "flatMap",
    accepted ↦ "Ljava/lang/Integer;",
    returned ↦ "Ljava/lang/Object;",
    static ↦ "true",
    captures ↦ ⟦ ρ ↦ ∅ ⟧,
    emit-shape ↦ "cps",
    body ↦ ⟦
      t0-invoke ↦ ⟦
        φ ↦ Φ.jeo.opcode.invokestatic,
        i2 ↦ "Foo",
        i3 ↦ "lambda$main$0",
        i4 ↦ "(Ljava/lang/Integer;)Ljava/util/stream/Stream;",
        i5 ↦ Φ.false
      ⟧,
      t1-emit ↦ ⟦ φ ↦ Φ.hone.emit ⟧
    ⟧
  ⟧}
expected:
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.aload,
      i1 ↦ 1
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.invokeinterface,
      i2 ↦ "java/util/stream/Stream",
      i3 ↦ "forEach",
      i4 ↦ "(Ljava/util/function/Consumer;)V",
      i5 ↦ Φ.true
    ⟧
