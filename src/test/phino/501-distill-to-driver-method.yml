---
# yamllint disable rule:line-length
# Validates 501-distill-to-driver-method on a hand-crafted Φ.hone.distill
# with `emit-shape ↦ "driver"` and zero captures. The body is a minimal
# iterator-style skeleton (aload Iterator from slot 0, invokeinterface
# hasNext / next, top-level Φ.hone.emit marker) that the lowering must
# carry through verbatim into the synthesised method. The rule should:
#   * Replace the distill in the caller body with the three-opcode triple
#     `invokeinterface Stream.iterator()` + `swap` + `invokestatic` to
#     the synthesised driver method.
#   * Append a private static method whose signature is
#     (Iterator, Consumer)V and whose body wraps the original distill body
#     between the `Φ.jeo.seq.of` header and a trailing `return`.
#   * Keep the `Φ.hone.emit` marker at the top level of the synthesised
#     method body so a future fusion rule (Step 7) can splice / graft
#     against it.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/501-distill-to-driver-method.phr
input: |
  {⟦
    φ ↦ Φ.jeo.class,
    version ↦ 66,
    access ↦ 33,
    name ↦ "Foo",
    supername ↦ "java/lang/Object",
    main ↦ ⟦
      φ ↦ Φ.jeo.method,
      access ↦ 4096,
      name ↦ "main",
      descriptor ↦ "()V",
      body ↦ ⟦
        d0 ↦ ⟦
          φ ↦ Φ.hone.distill,
          class ↦ "Foo",
          bridge-input ↦ "Ljava/lang/Object;",
          bridge-output ↦ "Ljava/lang/Object;",
          start ↦ "sorted",
          accepted ↦ "Ljava/lang/Object;",
          returned ↦ "Ljava/lang/Object;",
          static ↦ "true",
          captures ↦ ⟦ ρ ↦ ∅ ⟧,
          emit-shape ↦ "driver",
          body ↦ ⟦
            b0 ↦ ⟦ φ ↦ Φ.jeo.opcode.aload, i1 ↦ 0 ⟧,
            b1 ↦ ⟦
              φ ↦ Φ.jeo.opcode.invokeinterface,
              i2 ↦ "java/util/Iterator",
              i3 ↦ "hasNext",
              i4 ↦ "()Z",
              i5 ↦ Φ.true
            ⟧,
            b2 ↦ ⟦ φ ↦ Φ.hone.emit, emit-context ↦ "top-level" ⟧
          ⟧
        ⟧
      ⟧
    ⟧
  ⟧}
expected:
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.invokeinterface,
      i2 ↦ "java/util/stream/Stream",
      i3 ↦ "iterator",
      i4 ↦ "()Ljava/util/Iterator;",
      i5 ↦ Φ.true
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.swap
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.invokestatic,
      i2 ↦ "Foo",
      i3 ↦ 𝑒-driver-method,
      i4 ↦ "(Ljava/util/Iterator;Ljava/util/function/Consumer;)V",
      i5 ↦ Φ.false
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.method,
      access ↦ 4106,
      descriptor ↦ "(Ljava/util/Iterator;Ljava/util/function/Consumer;)V",
      𝐵-driver-tail
    ⟧
  - |
    ⟦
      φ ↦ Φ.hone.emit,
      emit-context ↦ "top-level"
    ⟧
