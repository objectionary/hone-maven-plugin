---
# yamllint disable rule:line-length
# 512 fuses two adjacent Φ.hone.mapMulti pragmas in a caller method's
# body into one. It synthesizes two static methods on the class:
#
#   merged(T, Consumer<S>)  — calls b1's target with an inline Consumer<R>
#   wrap(Consumer<S>, R)    — calls b2's target with (R, c)
#
# The single resulting Φ.hone.mapMulti pragma points at merged, and
# 601 lowers it back to Φ.hone.lambda in the usual way.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/512-merge-mapMulti.phr
input: |
  {⟦
    φ ↦ Φ.jeo.class,
    name ↦ "Foo",
    jm$main ↦ ⟦
      φ ↦ Φ.jeo.method,
      name ↦ "main",
      body ↦ ⟦
        i0 ↦ ⟦
          φ ↦ Φ.hone.mapMulti,
          class ↦ "Foo",
          target-method ↦ "b1_target",
          bridge-input ↦ "Ljava/lang/Integer;",
          map-multi-consumer ↦ "Ljava/util/function/BiConsumer;",
          lambda-signature ↦ "(Ljava/lang/Object;Ljava/lang/Object;)V",
          consumer ↦ "Ljava/util/function/Consumer;",
          stream-class ↦ "java/util/stream/Stream",
          static ↦ "true",
          is-interface ↦ Φ.false
        ⟧,
        i1 ↦ ⟦
          φ ↦ Φ.hone.mapMulti,
          class ↦ "Foo",
          target-method ↦ "b2_target",
          bridge-input ↦ "Ljava/lang/Long;",
          map-multi-consumer ↦ "Ljava/util/function/BiConsumer;",
          lambda-signature ↦ "(Ljava/lang/Object;Ljava/lang/Object;)V",
          consumer ↦ "Ljava/util/function/Consumer;",
          stream-class ↦ "java/util/stream/Stream",
          static ↦ "true",
          is-interface ↦ Φ.false
        ⟧
      ⟧
    ⟧
  ⟧}
expected:
  - |
    ⟦
      𝐵-class-pre,
      𝜏-caller ↦ ⟦
        φ ↦ Φ.jeo.method,
        𝐵-method-pre,
        body ↦ ⟦
          𝜏-only ↦ ⟦
            φ ↦ Φ.hone.mapMulti,
            𝐵-mm
          ⟧,
          ρ ↦ ∅
        ⟧,
        𝐵-method-post
      ⟧,
      𝐵-class-post
    ⟧
  - |
    ⟦
      𝐵-pre,
      𝜏-merged ↦ ⟦
        φ ↦ Φ.jeo.method,
        𝐵-pre-desc,
        descriptor ↦ "(Ljava/lang/Integer;Ljava/util/function/Consumer;)V",
        𝐵-post-desc
      ⟧,
      𝐵-post
    ⟧
  - |
    ⟦
      𝐵-pre,
      𝜏-wrap ↦ ⟦
        φ ↦ Φ.jeo.method,
        𝐵-pre-desc,
        descriptor ↦ "(Ljava/util/function/Consumer;Ljava/lang/Long;)V",
        𝐵-post-desc
      ⟧,
      𝐵-post
    ⟧
