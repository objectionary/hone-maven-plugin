---
# yamllint disable rule:line-length
# 606 unrecognises a Φ.hone.primitive-take-while pragma back into a
# Φ.hone.lambda with the original {Int,Long,Double}Stream.takeWhile(...)
# invokeinterface call, so the 7xx phase can lower it back to
# invokedynamic + invokeinterface.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/606-primitive-take-while-to-lambda.phr
input: |
  {⟦
    φ ↦ Φ.hone.primitive-take-while,
    opcode ↦ "invokestatic",
    class ↦ "Foo",
    stream-class ↦ "java/util/stream/IntStream",
    stream-signature ↦ "(Ljava/util/function/IntPredicate;)Ljava/util/stream/IntStream;",
    interface ↦ "()Ljava/util/function/IntPredicate;",
    lambda-signature ↦ "(I)Z",
    bridge-signature ↦ "(I)Z",
    static ↦ "true",
    target ↦ ⟦
      handle ↦ 6,
      class ↦ "Foo",
      method ↦ "lambda$main$0",
      signature ↦ "(I)Z",
      is-interface ↦ Φ.false
    ⟧
  ⟧}
expected:
  - |
    ⟦
      φ ↦ Φ.hone.lambda,
      class ↦ "Foo",
      method ↦ "test",
      interface ↦ "()Ljava/util/function/IntPredicate;",
      lambda-signature ↦ "(I)Z",
      bridge-signature ↦ "(I)Z",
      static ↦ "true",
      opcode ↦ "invokestatic",
      target ↦ ⟦
        handle ↦ 6,
        class ↦ "Foo",
        method ↦ "lambda$main$0",
        signature ↦ "(I)Z",
        is-interface ↦ Φ.false
      ⟧,
      stream ↦ ⟦
        class ↦ "java/util/stream/IntStream",
        method ↦ "takeWhile",
        signature ↦ "(Ljava/util/function/IntPredicate;)Ljava/util/stream/IntStream;"
      ⟧
    ⟧
