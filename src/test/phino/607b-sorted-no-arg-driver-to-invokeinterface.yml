---
# yamllint disable rule:line-length
# 607b unrecognises a Φ.hone.distill that carries the sorted-no-arg
# driver signature (start ↦ "sorted", emit-shape ↦ "driver", one
# ArrayList capture) back into the bare `invokeinterface
# java/util/stream/Stream.sorted:()Ljava/util/stream/Stream;` opcode.
# It is the inverse of 213-sorted-to-driver and fires whenever no
# downstream rule has consumed the driver-shape pragma. Issue #570
# Step 5a.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/607b-sorted-no-arg-driver-to-invokeinterface.phr
input: |
  {⟦
    body ↦ ⟦
      d0 ↦ ⟦
        φ ↦ Φ.hone.distill,
        class ↦ "Foo",
        bridge-input ↦ "Ljava/lang/Object;",
        bridge-output ↦ "Ljava/lang/Object;",
        start ↦ "sorted",
        accepted ↦ "Ljava/lang/Object;",
        returned ↦ "Ljava/lang/Object;",
        static ↦ "true",
        captures ↦ ⟦
          c0 ↦ ⟦
            φ ↦ Φ.hone.capture,
            type ↦ "Ljava/util/ArrayList;",
            init ↦ ⟦
              k0-new ↦ ⟦
                φ ↦ Φ.jeo.opcode.new,
                i1 ↦ "java/util/ArrayList"
              ⟧,
              k1-dup ↦ ⟦ φ ↦ Φ.jeo.opcode.dup ⟧,
              k2-init ↦ ⟦
                φ ↦ Φ.jeo.opcode.invokespecial,
                i2 ↦ "java/util/ArrayList",
                i3 ↦ "<init>",
                i4 ↦ "()V",
                i5 ↦ Φ.false
              ⟧
            ⟧
          ⟧
        ⟧,
        emit-shape ↦ "driver",
        body ↦ ⟦
          b0-emit ↦ ⟦ φ ↦ Φ.hone.emit, emit-context ↦ "top-level" ⟧
        ⟧
      ⟧
    ⟧
  ⟧}
expected:
  - |
    ⟦
      𝐵-before,
      𝜏-invokeinterface ↦ ⟦
        φ ↦ Φ.jeo.opcode.invokeinterface,
        i2 ↦ "java/util/stream/Stream",
        i3 ↦ "sorted",
        i4 ↦ "()Ljava/util/stream/Stream;",
        i5 ↦ Φ.true
      ⟧,
      𝐵-after
    ⟧
