---
# yamllint disable rule:line-length
# 607c unrecognises a Φ.hone.distill that carries the sorted-comparator
# driver signature (start ↦ "sorted-comparator", emit-shape ↦ "driver",
# two captures: a Comparator with an inline Φ.jeo.opcode.invokedynamic
# init and an ArrayList with a `new + dup + invokespecial` init) back
# into the original `invokedynamic + invokeinterface java/util/stream/
# Stream.sorted:(Ljava/util/function/Comparator;)Ljava/util/stream/
# Stream;` opcode pair. It is the inverse of
# 214-sorted-comparator-to-driver and fires whenever no downstream rule
# has consumed the driver-shape pragma. Issue #570 Step 5b.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/607c-sorted-comparator-driver-to-invokeinterface.phr
input: |
  {⟦
    body ↦ ⟦
      d0 ↦ ⟦
        φ ↦ Φ.hone.distill,
        class ↦ "Foo",
        bridge-input ↦ "Ljava/lang/Object;",
        bridge-output ↦ "Ljava/lang/Object;",
        start ↦ "sorted-comparator",
        accepted ↦ "Ljava/lang/Object;",
        returned ↦ "Ljava/lang/Object;",
        static ↦ "true",
        captures ↦ ⟦
          c0 ↦ ⟦
            φ ↦ Φ.hone.capture,
            type ↦ "Ljava/util/Comparator;",
            init ↦ ⟦
              k0-indy ↦ ⟦
                φ ↦ Φ.jeo.opcode.invokedynamic,
                i2 ↦ "compare",
                i3 ↦ "()Ljava/util/function/Comparator;",
                i4 ↦ ⟦
                  φ ↦ Φ.jeo.handle,
                  i1 ↦ 6,
                  i2 ↦ "java/lang/invoke/LambdaMetafactory",
                  i3 ↦ "metafactory",
                  i4 ↦ "(Ljava/lang/invoke/MethodHandles$Lookup;Ljava/lang/String;Ljava/lang/invoke/MethodType;Ljava/lang/invoke/MethodType;Ljava/lang/invoke/MethodHandle;Ljava/lang/invoke/MethodType;)Ljava/lang/invoke/CallSite;",
                  i5 ↦ Φ.false
                ⟧,
                i5 ↦ ⟦
                  φ ↦ Φ.jeo.type,
                  i1 ↦ "(Ljava/lang/Object;Ljava/lang/Object;)I"
                ⟧,
                i6 ↦ ⟦
                  φ ↦ Φ.jeo.handle,
                  i1 ↦ 6,
                  i2 ↦ "Foo",
                  i3 ↦ "lambda$main$0",
                  i4 ↦ "(Ljava/lang/Integer;Ljava/lang/Integer;)I",
                  i5 ↦ Φ.false
                ⟧,
                i7 ↦ ⟦
                  φ ↦ Φ.jeo.type,
                  i1 ↦ "(Ljava/lang/Integer;Ljava/lang/Integer;)I"
                ⟧
              ⟧
            ⟧
          ⟧,
          c1 ↦ ⟦
            φ ↦ Φ.hone.capture,
            type ↦ "Ljava/util/ArrayList;",
            init ↦ ⟦
              k0-new ↦ ⟦
                φ ↦ Φ.jeo.opcode.new,
                i1 ↦ "java/util/ArrayList"
              ⟧,
              k1-dup ↦ ⟦ φ ↦ Φ.jeo.opcode.dup ⟧,
              k2-init ↦ ⟦
                φ ↦ Φ.jeo.opcode.invokespecial,
                i2 ↦ "java/util/ArrayList",
                i3 ↦ "<init>",
                i4 ↦ "()V",
                i5 ↦ Φ.false
              ⟧
            ⟧
          ⟧
        ⟧,
        emit-shape ↦ "driver",
        body ↦ ⟦
          b0-emit ↦ ⟦ φ ↦ Φ.hone.emit, emit-context ↦ "top-level" ⟧
        ⟧
      ⟧
    ⟧
  ⟧}
expected:
  - |
    ⟦
      𝐵-before,
      𝜏-indy ↦ ⟦
        φ ↦ Φ.jeo.opcode.invokedynamic,
        i2 ↦ "compare",
        i3 ↦ "()Ljava/util/function/Comparator;",
        i4 ↦ ⟦
          φ ↦ Φ.jeo.handle,
          i1 ↦ 6,
          i2 ↦ "java/lang/invoke/LambdaMetafactory",
          i3 ↦ "metafactory",
          i4 ↦ "(Ljava/lang/invoke/MethodHandles$Lookup;Ljava/lang/String;Ljava/lang/invoke/MethodType;Ljava/lang/invoke/MethodType;Ljava/lang/invoke/MethodHandle;Ljava/lang/invoke/MethodType;)Ljava/lang/invoke/CallSite;",
          i5 ↦ Φ.false
        ⟧,
        i5 ↦ ⟦
          φ ↦ Φ.jeo.type,
          i1 ↦ "(Ljava/lang/Object;Ljava/lang/Object;)I"
        ⟧,
        i6 ↦ ⟦
          φ ↦ Φ.jeo.handle,
          i1 ↦ 6,
          i2 ↦ "Foo",
          i3 ↦ "lambda$main$0",
          i4 ↦ "(Ljava/lang/Integer;Ljava/lang/Integer;)I",
          i5 ↦ Φ.false
        ⟧,
        i7 ↦ ⟦
          φ ↦ Φ.jeo.type,
          i1 ↦ "(Ljava/lang/Integer;Ljava/lang/Integer;)I"
        ⟧
      ⟧,
      𝜏-invokeinterface ↦ ⟦
        φ ↦ Φ.jeo.opcode.invokeinterface,
        i2 ↦ "java/util/stream/Stream",
        i3 ↦ "sorted",
        i4 ↦ "(Ljava/util/function/Comparator;)Ljava/util/stream/Stream;",
        i5 ↦ Φ.true
      ⟧,
      𝐵-after
    ⟧
