---
# yamllint disable rule:line-length
# 607d unrecognises a Φ.hone.distill that carries the limit driver
# signature (start ↦ "limit", emit-shape ↦ "driver", one `long[1]`
# counter capture with `count ↦ 𝑒-count`) back into the original
# `ldc Φ.jeo.long(N) + invokeinterface java/util/stream/Stream.limit:
# (J)Ljava/util/stream/Stream;` opcode pair. It is the inverse of
# 216-limit-to-driver and fires whenever no downstream rule has consumed
# the driver-shape pragma. Issue #570 Step 6.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/607d-limit-driver-to-ldc-invokeinterface.phr
input: |
  {⟦
    body ↦ ⟦
      d0 ↦ ⟦
        φ ↦ Φ.hone.distill,
        class ↦ "Foo",
        bridge-input ↦ "Ljava/lang/Object;",
        bridge-output ↦ "Ljava/lang/Object;",
        start ↦ "limit",
        accepted ↦ "Ljava/lang/Object;",
        returned ↦ "Ljava/lang/Object;",
        static ↦ "true",
        captures ↦ ⟦
          c0 ↦ ⟦
            φ ↦ Φ.hone.capture,
            type ↦ "[J",
            count ↦ 20,
            init ↦ ⟦
              k0-iconst-1 ↦ ⟦ φ ↦ Φ.jeo.opcode.iconst_1 ⟧,
              k1-newarray ↦ ⟦
                φ ↦ Φ.jeo.opcode.newarray,
                i1 ↦ "long"
              ⟧
            ⟧
          ⟧
        ⟧,
        emit-shape ↦ "driver",
        body ↦ ⟦
          b0-emit ↦ ⟦ φ ↦ Φ.hone.emit, emit-context ↦ "top-level" ⟧
        ⟧
      ⟧
    ⟧
  ⟧}
expected:
  - |
    ⟦
      𝐵-before,
      𝜏-push ↦ ⟦
        φ ↦ Φ.jeo.opcode.ldc,
        i1 ↦ ⟦
          φ ↦ Φ.jeo.long,
          i1 ↦ 20
        ⟧
      ⟧,
      𝜏-invokeinterface ↦ ⟦
        φ ↦ Φ.jeo.opcode.invokeinterface,
        i2 ↦ "java/util/stream/Stream",
        i3 ↦ "limit",
        i4 ↦ "(J)Ljava/util/stream/Stream;",
        i5 ↦ Φ.true
      ⟧,
      𝐵-after
    ⟧
