---
# yamllint disable rule:line-length
# Runs the full distinct migration path end-to-end: 353-distinct-to-distill
# folds Φ.hone.distinct into a cps Φ.hone.distill with one HashSet capture,
# 491 lowers the Φ.hone.emit marker to the accept-call triple, and 502b
# emits the Φ.hone.lambda + capture init opcodes in the caller body plus
# the synthetic wrapper method on the class. The final output must contain
# (a) the three HashSet init opcodes, (b) a Φ.hone.lambda binding HashSet
# into a BiConsumer, and (c) a sibling method whose body does HashSet.add
# and conditional Consumer.accept — i.e. the same shape that today's
# 353-distinct-to-mapMulti emits in one rule, now arrived at via the distill
# intermediate so that 401c can fuse this stage with adjacent pointwise ops.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/353-distinct-to-distill.phr
  - src/main/resources/org/eolang/hone/rules/streams/491-emit-to-accept-call.phr
  - src/main/resources/org/eolang/hone/rules/streams/502b-cps-one-cap-to-lambda.phr
input: |
  {⟦
    φ ↦ Φ.jeo.class,
    version ↦ 66,
    access ↦ 33,
    name ↦ "Foo",
    supername ↦ "java/lang/Object",
    main ↦ ⟦
      φ ↦ Φ.jeo.method,
      access ↦ 4096,
      name ↦ "main",
      descriptor ↦ "()V",
      body ↦ ⟦
        i1 ↦ ⟦
          φ ↦ Φ.hone.distinct,
          stream-class ↦ "java/util/stream/Stream"
        ⟧
      ⟧
    ⟧
  ⟧}
expected:
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.new,
      i1 ↦ "java/util/HashSet"
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.invokespecial,
      i2 ↦ "java/util/HashSet",
      i3 ↦ "<init>",
      i4 ↦ "()V",
      i5 ↦ Φ.false
    ⟧
  - |
    ⟦
      φ ↦ Φ.hone.lambda,
      class ↦ "Foo",
      method ↦ "accept",
      interface ↦ "(Ljava/util/HashSet;)Ljava/util/function/BiConsumer;",
      𝐵-lambda-tail
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.invokevirtual,
      i2 ↦ "java/util/HashSet",
      i3 ↦ "add",
      i4 ↦ "(Ljava/lang/Object;)Z",
      i5 ↦ Φ.false
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.invokeinterface,
      i2 ↦ "java/util/function/Consumer",
      i3 ↦ "accept",
      i4 ↦ "(Ljava/lang/Object;)V",
      i5 ↦ Φ.true
    ⟧
