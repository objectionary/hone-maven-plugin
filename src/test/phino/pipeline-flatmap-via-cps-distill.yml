---
# yamllint disable rule:line-length
# Runs the full flatMap migration path end-to-end: 208-flatMap-to-distill
# folds Φ.hone.flatMap into a zero-capture cps Φ.hone.distill tagged with
# `start ↦ "flatMap"`, 491 explicitly skips this distill (its `when:`
# guard excludes "flatMap" starts), 493 lowers the Φ.hone.emit marker
# into `aload 1; invokeinterface Stream.forEach`, and 502a emits the
# Φ.hone.lambda over mapMulti plus a synthetic wrapper that wraps the
# lambda invocation between `aload 0` and `return`. The final output
# must contain (a) a Φ.hone.lambda dispatching to mapMulti via
# BiConsumer, (b) the invokestatic of the user's lambda inside the
# wrapper body, and (c) the invokeinterface forEach that hands the
# user's Stream off to the downstream consumer.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/208-flatMap-to-distill.phr
  - src/main/resources/org/eolang/hone/rules/streams/491-emit-to-accept-call.phr
  - src/main/resources/org/eolang/hone/rules/streams/493-emit-to-foreach.phr
  - src/main/resources/org/eolang/hone/rules/streams/502a-cps-no-cap-to-lambda.phr
input: |
  {⟦
    φ ↦ Φ.jeo.class,
    version ↦ 66,
    access ↦ 33,
    name ↦ "Foo",
    supername ↦ "java/lang/Object",
    jm$main ↦ ⟦
      φ ↦ Φ.jeo.method,
      access ↦ 4096,
      name ↦ "main",
      descriptor ↦ "()V",
      body ↦ ⟦
        i0 ↦ ⟦
          φ ↦ Φ.hone.flatMap,
          opcode ↦ "invokestatic",
          class ↦ "Foo",
          bridge-input ↦ "Ljava/lang/Integer;",
          bridge-output ↦ "Ljava/util/stream/Stream;",
          accepted ↦ "Ljava/lang/Integer;",
          returned ↦ "Ljava/util/stream/Stream;",
          static ↦ "true",
          target ↦ ⟦
            handle ↦ 6,
            class ↦ "Foo",
            method ↦ "lambda$main$0",
            signature ↦ "(Ljava/lang/Integer;)Ljava/util/stream/Stream;",
            is-interface ↦ Φ.false
          ⟧
        ⟧
      ⟧
    ⟧
  ⟧}
expected:
  - |
    ⟦
      φ ↦ Φ.hone.lambda,
      class ↦ "Foo",
      method ↦ "accept",
      interface ↦ "()Ljava/util/function/BiConsumer;",
      𝐵-lambda-tail
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.invokestatic,
      i2 ↦ "Foo",
      i3 ↦ "lambda$main$0",
      i4 ↦ "(Ljava/lang/Integer;)Ljava/util/stream/Stream;",
      i5 ↦ Φ.false
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.aload,
      i1 ↦ 1
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.invokeinterface,
      i2 ↦ "java/util/stream/Stream",
      i3 ↦ "forEach",
      i4 ↦ "(Ljava/util/function/Consumer;)V",
      i5 ↦ Φ.true
    ⟧
