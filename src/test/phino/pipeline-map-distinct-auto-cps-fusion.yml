---
# yamllint disable rule:line-length
# Mirrors pipeline-distinct-map-cps-fusion but in the opposite order: a
# `.map().distinct()` pipeline. After folding, the body holds an auto
# distill (map) followed by a cps distill (distinct). 401b-fuse-auto-cps
# concatenates the bodies via join: the map's invokestatic transforms the
# item, leaves it on top of stack, and the cps body (HashSet.add + emit)
# picks it up. Two operations, one mapMulti dispatch.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/306-map-to-distill.phr
  - src/main/resources/org/eolang/hone/rules/streams/353-distinct-to-distill.phr
  - src/main/resources/org/eolang/hone/rules/streams/401b-fuse-auto-cps.phr
  - src/main/resources/org/eolang/hone/rules/streams/491-emit-to-accept-call.phr
  - src/main/resources/org/eolang/hone/rules/streams/502-cps-one-cap-to-lambda.phr
input: |
  {⟦
    φ ↦ Φ.jeo.class,
    version ↦ 66,
    access ↦ 33,
    name ↦ "Foo",
    supername ↦ "java/lang/Object",
    main ↦ ⟦
      φ ↦ Φ.jeo.method,
      access ↦ 4096,
      name ↦ "main",
      descriptor ↦ "()V",
      body ↦ ⟦
        i1 ↦ ⟦
          φ ↦ Φ.hone.map,
          opcode ↦ "invokestatic",
          class ↦ "Foo",
          bridge-input ↦ "Ljava/lang/Object;",
          bridge-output ↦ "Ljava/lang/Object;",
          accepted ↦ "Ljava/lang/Object;",
          returned ↦ "Ljava/lang/Object;",
          static ↦ "true",
          target ↦ ⟦
            handle ↦ 6,
            class ↦ "Foo",
            method ↦ "lambda$0",
            signature ↦ "(Ljava/lang/Object;)Ljava/lang/Object;",
            is-interface ↦ Φ.false
          ⟧
        ⟧,
        i2 ↦ ⟦
          φ ↦ Φ.hone.distinct,
          stream-class ↦ "java/util/stream/Stream"
        ⟧
      ⟧
    ⟧
  ⟧}
expected:
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.new,
      i1 ↦ "java/util/HashSet"
    ⟧
  - |
    ⟦
      φ ↦ Φ.hone.lambda,
      class ↦ "Foo",
      method ↦ "accept",
      interface ↦ "(Ljava/util/HashSet;)Ljava/util/function/BiConsumer;",
      𝐵-lambda-tail
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.invokestatic,
      i2 ↦ "Foo",
      i3 ↦ "lambda$0",
      i4 ↦ "(Ljava/lang/Object;)Ljava/lang/Object;",
      i5 ↦ Φ.false
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.invokevirtual,
      i2 ↦ "java/util/HashSet",
      i3 ↦ "add",
      i4 ↦ "(Ljava/lang/Object;)Z",
      i5 ↦ Φ.false
    ⟧
