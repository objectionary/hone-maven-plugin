---
# yamllint disable rule:line-length
# Runs the full primitive-skip migration path end-to-end for the
# IntStream case: 355-primitive-skip-to-distill folds
# Φ.hone.primitive-skip into a cps Φ.hone.distill with bridge-input
# "I" and one [J capture, 491 lowers the Φ.hone.emit marker to the
# IntConsumer.accept(I) triple, and 502b emits the Φ.hone.lambda
# binding [J into an IntMapMultiConsumer plus the three init opcodes
# and a synthetic wrapper method whose signature is
# ([JILjava/util/function/IntConsumer;)V.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/355-primitive-skip-to-distill.phr
  - src/main/resources/org/eolang/hone/rules/streams/491-emit-to-accept-call.phr
  - src/main/resources/org/eolang/hone/rules/streams/502b-cps-one-cap-to-lambda.phr
input: |
  {⟦
    φ ↦ Φ.jeo.class,
    version ↦ 66,
    access ↦ 33,
    name ↦ "Foo",
    supername ↦ "java/lang/Object",
    main ↦ ⟦
      φ ↦ Φ.jeo.method,
      access ↦ 4096,
      name ↦ "main",
      descriptor ↦ "()V",
      body ↦ ⟦
        i1 ↦ ⟦
          φ ↦ Φ.hone.primitive-skip,
          stream-class ↦ "java/util/stream/IntStream",
          stream-signature ↦ "(J)Ljava/util/stream/IntStream;",
          count ↦ 5
        ⟧
      ⟧
    ⟧
  ⟧}
expected:
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.newarray,
      i1 ↦ 11
    ⟧
  - |
    ⟦
      φ ↦ Φ.hone.lambda,
      class ↦ "Foo",
      method ↦ "accept",
      interface ↦ "([J)Ljava/util/stream/IntStream$IntMapMultiConsumer;",
      lambda-signature ↦ "(ILjava/util/function/IntConsumer;)V",
      𝐵-lambda-tail
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.ldc,
      i1 ↦ ⟦
        φ ↦ Φ.jeo.long,
        i1 ↦ 5
      ⟧
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.lcmp
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.ladd
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.invokeinterface,
      i2 ↦ "java/util/function/IntConsumer",
      i3 ↦ "accept",
      i4 ↦ "(I)V",
      i5 ↦ Φ.true
    ⟧
