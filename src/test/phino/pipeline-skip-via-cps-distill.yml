---
# yamllint disable rule:line-length
# Runs the full skip migration path end-to-end: 353-skip-to-distill folds
# Φ.hone.skip into a cps Φ.hone.distill with one long[1] capture, 491
# lowers the Φ.hone.emit marker to the accept-call triple, and 502b
# emits the Φ.hone.lambda binding [J into a BiConsumer plus the three
# init opcodes in the caller body and a synthetic wrapper method on the
# class. The final output must contain (a) the long[] init opcodes, (b)
# a Φ.hone.lambda over [J, (c) the inlined threshold via ldc Φ.jeo.long(5)
# and the lcmp comparison, and (d) the consumer.accept invokeinterface.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/353-skip-to-distill.phr
  - src/main/resources/org/eolang/hone/rules/streams/491-emit-to-accept-call.phr
  - src/main/resources/org/eolang/hone/rules/streams/502b-cps-one-cap-to-lambda.phr
input: |
  {⟦
    φ ↦ Φ.jeo.class,
    version ↦ 66,
    access ↦ 33,
    name ↦ "Foo",
    supername ↦ "java/lang/Object",
    main ↦ ⟦
      φ ↦ Φ.jeo.method,
      access ↦ 4096,
      name ↦ "main",
      descriptor ↦ "()V",
      body ↦ ⟦
        i1 ↦ ⟦
          φ ↦ Φ.hone.skip,
          stream-class ↦ "java/util/stream/Stream",
          count ↦ 5
        ⟧
      ⟧
    ⟧
  ⟧}
expected:
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.newarray,
      i1 ↦ 11
    ⟧
  - |
    ⟦
      φ ↦ Φ.hone.lambda,
      class ↦ "Foo",
      method ↦ "accept",
      interface ↦ "([J)Ljava/util/function/BiConsumer;",
      𝐵-lambda-tail
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.ldc,
      i1 ↦ ⟦
        φ ↦ Φ.jeo.long,
        i1 ↦ 5
      ⟧
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.lcmp
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.ladd
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.invokeinterface,
      i2 ↦ "java/util/function/Consumer",
      i3 ↦ "accept",
      i4 ↦ "(Ljava/lang/Object;)V",
      i5 ↦ Φ.true
    ⟧
