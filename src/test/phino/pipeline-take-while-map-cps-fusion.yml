---
# yamllint disable rule:line-length
# Proves take-while joins the cps fusion path. A `.takeWhile().map()` pair
# folds to a cps distill + auto distill, 401c splices map's invokestatic
# immediately before the Φ.hone.emit inside take-while's body, 491 lowers
# the marker, and 502b emits the lambda + wrapper + boolean[1] init. The
# wrapper body ends up containing the gate check, the predicate call, the
# map's invokestatic, and the Consumer.accept call — one mapMulti dispatch
# for two operators.
rules:
  - src/main/resources/org/eolang/hone/rules/streams/306-map-to-distill.phr
  - src/main/resources/org/eolang/hone/rules/streams/351-take-while-to-distill.phr
  - src/main/resources/org/eolang/hone/rules/streams/401c-fuse-cps-auto.phr
  - src/main/resources/org/eolang/hone/rules/streams/491-emit-to-accept-call.phr
  - src/main/resources/org/eolang/hone/rules/streams/502b-cps-one-cap-to-lambda.phr
input: |
  {⟦
    φ ↦ Φ.jeo.class,
    version ↦ 66,
    access ↦ 33,
    name ↦ "Foo",
    supername ↦ "java/lang/Object",
    main ↦ ⟦
      φ ↦ Φ.jeo.method,
      access ↦ 4096,
      name ↦ "main",
      descriptor ↦ "()V",
      body ↦ ⟦
        i1 ↦ ⟦
          φ ↦ Φ.hone.take-while,
          opcode ↦ "invokestatic",
          class ↦ "Foo",
          bridge-signature ↦ "(Ljava/lang/Integer;)Z",
          static ↦ "true",
          target ↦ ⟦
            handle ↦ 6,
            class ↦ "Foo",
            method ↦ "lambda$pred",
            signature ↦ "(Ljava/lang/Integer;)Z",
            is-interface ↦ Φ.false
          ⟧
        ⟧,
        i2 ↦ ⟦
          φ ↦ Φ.hone.map,
          opcode ↦ "invokestatic",
          class ↦ "Foo",
          bridge-input ↦ "Ljava/lang/Object;",
          bridge-output ↦ "Ljava/lang/Object;",
          accepted ↦ "Ljava/lang/Object;",
          returned ↦ "Ljava/lang/Object;",
          static ↦ "true",
          target ↦ ⟦
            handle ↦ 6,
            class ↦ "Foo",
            method ↦ "lambda$map",
            signature ↦ "(Ljava/lang/Object;)Ljava/lang/Object;",
            is-interface ↦ Φ.false
          ⟧
        ⟧
      ⟧
    ⟧
  ⟧}
expected:
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.newarray,
      i1 ↦ 4
    ⟧
  - |
    ⟦
      φ ↦ Φ.hone.lambda,
      class ↦ "Foo",
      method ↦ "accept",
      interface ↦ "([Z)Ljava/util/function/BiConsumer;",
      𝐵-lambda-tail
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.invokestatic,
      i2 ↦ "Foo",
      i3 ↦ "lambda$pred",
      i4 ↦ "(Ljava/lang/Integer;)Z",
      i5 ↦ Φ.false
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.invokestatic,
      i2 ↦ "Foo",
      i3 ↦ "lambda$map",
      i4 ↦ "(Ljava/lang/Object;)Ljava/lang/Object;",
      i5 ↦ Φ.false
    ⟧
  - |
    ⟦
      φ ↦ Φ.jeo.opcode.invokeinterface,
      i2 ↦ "java/util/function/Consumer",
      i3 ↦ "accept",
      i4 ↦ "(Ljava/lang/Object;)V",
      i5 ↦ Φ.true
    ⟧
