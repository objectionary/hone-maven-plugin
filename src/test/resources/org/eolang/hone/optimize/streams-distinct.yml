# FIVE `.distinct()` calls in one pipeline, including a run of THREE
# consecutive ones (.distinct().distinct().distinct()) with no stateless
# operator between them. Every distinct folds into a stateful distill and
# ALL FIVE fuse — together with the stateless maps — into a SINGLE
# Stream.mapMulti dispatch backed by ONE captured java/util/List that holds
# all FIVE java/util/HashSet seen-sets. This exercises both fusion shapes
# at once: stateful-next-to-stateless (map.distinct) AND stateful-next-to-
# stateful (the three back-to-back distincts), proving 401-fuse merges
# adjacent stateful distills directly. 502 builds one ArrayList and appends
# every set to it in order; 521 reads each set back with List.get(counter++)
# so the Nth distinct guard consults the Nth set. The single surviving
# invokedynamic proves the whole chain collapsed to one dispatch.
#
#   [1,2,2,3,1,3,4] --map(+1)--> [2,3,3,4,2,4,5] --distinct--> [2,3,4,5]
#                   --map(*2)--> [4,6,8,10]       --distinct--> [4,6,8,10]
#                   --distinct--> [4,6,8,10] --distinct--> [4,6,8,10]
#                   --distinct--> [4,6,8,10]  --count()--> 4
#
# The `after` counts assert the fully fused shape: everything collapses to
# one dispatch (invokedynamic == 1); six allocations appear (new == 6: one
# ArrayList for the captured state plus the five HashSets); the two maps and
# five distincts share one mapMulti, so invokeinterface == 13 (one mapMulti +
# count + the wrapper's consumer.accept + five List.add appends + five
# List.get fetches) and invokevirtual == 8 (five HashSet.add plus the three
# already present). Boxing rises to invokestatic == 13 as the lambda bodies
# move into the single synthesised wrapper.
java: |
  package distinct;
  import java.util.stream.*;
  public class X {
    public static void main(String[] a) {
      long n = Stream.of(1, 2, 2, 3, 1, 3, 4)
        .map(x -> x + 1).distinct()
        .map(x -> x * 2).distinct()
        .distinct().distinct().distinct()
        .count();
      System.out.printf("The result is %d\n", n);
    }
  }
log:
  - "Modified 1/1 X.phi"
  - "Finished rewriting 1 file"
  - "BUILD SUCCESS"
  - "The result is 4"
before:
  invokedynamic: 2
  invokeinterface: 8
  invokestatic: 11
  invokevirtual: 3
  new: 0
after:
  invokedynamic: 1
  invokeinterface: 13
  invokestatic: 13
  invokevirtual: 8
  new: 6
