java: |
  package flatmapped;
  import java.util.*;
  import java.util.stream.*;
  public class X {
    public static void main(String[] a) {
      int r = Arrays.asList(1, 2, 3).stream()
        .map(n -> n * 2)
        .flatMap(n -> Stream.of(n, n + 1))
        .map(n -> n + 10)
        .mapToInt(Integer::intValue)
        .sum();
      System.out.printf("The result is %d\n", r);
    }
  }
