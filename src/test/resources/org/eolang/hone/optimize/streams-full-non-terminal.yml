---
# Full non-terminal stream coverage test. The pipeline exercises every
# one of the 21 non-terminal operators of the Java 21 Stream API
# (distinct, dropWhile, filter, flatMap, flatMapToDouble, flatMapToInt,
# flatMapToLong, limit, map, mapMulti, mapMultiToDouble, mapMultiToInt,
# mapMultiToLong, mapToDouble, mapToInt, mapToLong, peek, skip, sorted,
# sorted(Comparator), takeWhile). The Stream<T> operators appear twice
# each, the nine *To{Int,Long,Double} variants appear once each with
# boxed() between them as the only bridge back to Stream<T> (boxed is
# not itself one of the 21 but is unavoidable for the type system).
# The opcodes assertion pins the current count of invokedynamic in the
# optimised class: 21 after the issue #570 cps-distill migration
# landed. The architecture's long-term floor is one mapMulti emitter
# per *fusable* segment; the structural reasons this particular
# fixture sits well above that floor are:
#  - Sorted and limit are non-fusable barriers (Step 10 option A) —
#    each of the four sorted variants and two limit calls in the
#    pipeline survives as its own invokeinterface dispatch and forces
#    the surrounding stateless segments apart.
#  - mapMulti / mapMultiTo* cps distill bodies carry no Φ.hone.emit
#    marker (the user lambda owns emission via consumer.accept), so
#    401c-fuse-cps-auto cannot splice a downstream auto body anywhere
#    and each call surfaces its own mapMulti wrapper.
#  - flatMap-shape cps distills (plain flatMap and flatMapTo*) emit a
#    user-produced Stream rather than a single item, so 401c excludes
#    them from fusion via the `not eq: start "flatMap"` arm of its
#    `when` guard — splicing a downstream auto body before the emit
#    would try to operate on a Stream value as an item and crash
#    VerifyError. 401b can still pre-pend an upstream auto to a
#    flatMap cps body (the auto leaves an item on stack, which the
#    flatMap lambda happily consumes), but in this fixture no flatMap
#    sits directly downstream of an auto distill.
# Together those reasons account for the bulk of the 21 invokedynamic
# dispatches that remain. See issues #556 and #570.
java: |
  package allnonterminal;
  import java.util.Comparator;
  import java.util.stream.DoubleStream;
  import java.util.stream.IntStream;
  import java.util.stream.LongStream;
  import java.util.stream.Stream;
  public class X {
    public static void main(String[] a) {
      double r = Stream.of(5, 3, 8, 5, 2, 7, 4, 1, 6, 9)
        .filter(n -> n > 0)
        .map(n -> n + 1)
        .peek(n -> {})
        .distinct()
        .sorted()
        .sorted(Comparator.naturalOrder())
        .takeWhile(n -> n < 100)
        .dropWhile(n -> n < 0)
        .limit(20L)
        .skip(0L)
        .flatMap(n -> Stream.of(n, n))
        .<Integer>mapMulti((n, c) -> c.accept(n))
        .filter(n -> n != null)
        .map(n -> n + 0)
        .peek(n -> {})
        .sorted(Comparator.reverseOrder())
        .sorted()
        .distinct()
        .takeWhile(n -> n >= 0)
        .dropWhile(n -> n < -1)
        .limit(100L)
        .skip(0L)
        .flatMap(n -> Stream.of(n))
        .<Integer>mapMulti((n, c) -> c.accept(n))
        .mapToInt(Integer::intValue)
        .boxed()
        .mapToLong(Integer::longValue)
        .boxed()
        .mapToDouble(Long::doubleValue)
        .boxed()
        .flatMapToInt(d -> IntStream.of(d.intValue()))
        .boxed()
        .flatMapToLong(n -> LongStream.of(n.longValue()))
        .boxed()
        .flatMapToDouble(n -> DoubleStream.of(n.doubleValue()))
        .boxed()
        .mapMultiToInt((d, c) -> c.accept(d.intValue()))
        .boxed()
        .mapMultiToLong((n, c) -> c.accept(n.longValue()))
        .boxed()
        .mapMultiToDouble((n, c) -> c.accept(n.doubleValue()))
        .sum();
      System.out.printf("The result is %d\n", (int) r);
    }
  }
