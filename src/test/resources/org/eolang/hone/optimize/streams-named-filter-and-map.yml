---
# A stream pipeline that passes named-class instances to .filter()
# and .map() instead of lambdas or method references. Good is a
# nested static class implementing Predicate, Doubler is a nested
# static class implementing Function — both instantiated with `new`
# at the call site. The indy bootstrap mechanism is not involved
# here, so .filter() and .map() see plain virtual dispatches on
# user-defined classes. The rule pipeline must recognise these as
# the same shape as a lambda-backed filter/map and lower them
# correctly.
java: |
  package userclasses;
  import java.util.function.*;
  import java.util.stream.Stream;
  public class X {
    static class Good implements Predicate<Integer> {
      public boolean test(Integer n) {
        return n > 2;
      }
    }
    static class Doubler implements Function<Integer, Integer> {
      public Integer apply(Integer n) {
        return n * 2;
      }
    }
    public static void main(String[] a) {
      int r = Stream.of(1, 2, 3, 4, 5)
        .filter(new Good())
        .map(new Doubler())
        .mapToInt(Integer::intValue)
        .sum();
      System.out.printf("The result is %d\n", r);
    }
  }
log:
  - "Finished rewriting 3 file"
  - "BUILD SUCCESS"
  - "The result is 24"
