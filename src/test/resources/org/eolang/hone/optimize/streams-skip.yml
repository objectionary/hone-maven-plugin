---
# `.skip(n)` is "a filter that owns a countdown counter": 220 recognises it,
# 308 folds it into a stateful distill seeded with a captured long[1], and
# from there it rides the same machinery distinct does.
#
# Three scenarios, one class:
#
#   multi  : map(+1) / skip(2) / map(*2) with each op on its OWN line. The
#            1xx prep (151 strips line-numbers, 152 drops the dead labels they
#            anchored) leaves the count-push directly before the call, so the
#            single 220 recognises it just like the inline form. Fuses to one
#            Stream.mapMulti backed by a captured long[1]. [4,5,6,7] -> *2 -> 4.
#   inline : the same pipeline written on one line — same fused result (4),
#            proving the own-line and same-line layouts converge.
#   lone   : Stream.of(1..5).skip(2) on its own line. With no stateless
#            neighbour to fuse with, 442 reverts the distill to a plain
#            Stream.skip(2L) (a lone skip lowered to a mapMulti would be slower
#            than the native one), leaving it byte-for-byte unchanged. -> 3.
#
# The `after` counts assert it: the two fused pipelines drop invokedynamic
# 4 -> 2 (each pair of maps becomes one dispatch, the lone skip keeps none);
# exactly two long[1] counters are allocated (newarray == 2), one per fused
# skip, each wrapped in its own captured java/util/List (new == 2);
# invokeinterface climbs 10 -> 12 as each fused skip gains a List.add (state
# build) and a List.get (fetch); boxing only relocates into the synthesised
# wrappers (invokestatic 27 -> 31). Primitive-stream skip (IntStream/
# LongStream/DoubleStream) is out of scope for v1 — only
# java/util/stream/Stream.skip is recognised — exactly as for distinct.
java: |
  package skip;
  import java.util.stream.*;
  public class X {
    public static void main(String[] a) {
      long multi = Stream.of(1, 2, 3, 4, 5, 6)
        .map(x -> x + 1)
        .skip(2L)
        .map(x -> x * 2)
        .count();
      long inline = Stream.of(1, 2, 3, 4, 5, 6)
        .map(x -> x + 1).skip(2L).map(x -> x * 2).count();
      long lone = Stream.of(1, 2, 3, 4, 5)
        .skip(2L)
        .count();
      System.out.printf("The result is %d %d %d%n", multi, inline, lone);
    }
  }
log:
  - "Modified 1/1 X.phi"
  - "Finished rewriting 1 file"
  - "BUILD SUCCESS"
  - "The result is 4 4 3"
before:
  invokedynamic: 4
  invokeinterface: 10
  invokestatic: 27
  invokevirtual: 5
  newarray: 0
  new: 0
after:
  invokedynamic: 2
  invokeinterface: 12
  invokestatic: 31
  invokevirtual: 5
  newarray: 2
  new: 2
