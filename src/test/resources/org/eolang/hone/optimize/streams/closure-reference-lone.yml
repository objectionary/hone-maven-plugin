# End-to-end proof that a LONE single-reference-capture map lowers correctly to a
# standalone Stream.mapMulti (issue #657). Unlike closure-reference.yml — where two
# maps fuse into one mapMulti — here the capturing map has no neighbour to fuse
# with:
#
#   Stream.of(...).map(n -> n + base.size()).reduce(0, ...)
#
# 112's "(L…;)" branch lifts the capturing map to a Φ.hone.c-map, 115 peels the
# captured `aload` (the List) into the shared state, and 316 folds a lone stateful
# distill. With no neighbour to fuse with, the distill is lowered to a standalone
# mapMulti by 502/512/521/601 — there is no per-arity revert back to the native
# invokedynamic.
#
# invokedynamic: before = map(capturing) + reduce-accumulator lambda = 2; after =
# the map's mapMulti dispatch indy + the untouched reduce lambda = 2. The count is
# UNCHANGED because a mapMulti dispatch carries exactly one invokedynamic, like the
# native map it replaces. The runtime line is the behaviour oracle: base.size() ==
# 3, so {1,2,3,4,5} -> n+3 -> {4,5,6,7,8} -> sum == 30.
java: |
  package fusion;
  import java.util.*;
  import java.util.stream.*;
  public class CReferenceLone {
    static int run(List<Integer> base) {
      return Stream.of(1, 2, 3, 4, 5)
        .map(n -> n + base.size())
        .reduce(0, (a, b) -> a + b);
    }
    public static void main(String[] args) {
      System.out.printf("The result is %d%n", run(Arrays.asList(7, 8, 9)));
    }
  }
before:
  invokedynamic: 2
after:
  invokedynamic: 2
log:
  - "BUILD SUCCESS"
  - "The result is 30"
