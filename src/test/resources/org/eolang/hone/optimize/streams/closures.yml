---
# Consolidated closure / method-reference end-to-end suite. One class
# exercises every lambda-metafactory, Predicate / Function and capture
# shape the rule pipeline must either PRESERVE untouched or FUSE. Two things
# are asserted. The runtime result: the pipeline must never corrupt a
# roundtrip nor pessimise a lone operator, so a correct printout proves every
# path lowered to runnable bytecode. And the invokedynamic tally: it drops
# from 41 to 29 as the capturing and non-capturing operators collapse into
# Stream.mapMulti dispatches. A trailing mapToInt(Integer::intValue) folds into
# the distill in front of it (the generalized 451 preserves the predecessor's
# state, so it folds whether that distill is empty-state OR stateful/capturing)
# — but only into a distill that SURVIVES the 4xx fuse pass. capLoc and multiCap
# fuse a map/filter neighbour at 401, so they are no longer lone and their
# trailing mapToInt folds into the resulting mapMultiToInt. loneMulti and multiFil
# have no such neighbour: 401 leaves them lone, the lone-capture reverts 446/447
# fire (they run before 451) and put them back to a native invokedynamic, so their
# trailing mapToInt is left native too — two native indys apiece, the
# never-pessimise choice, rather than one mapMultiToInt carrying the capture-List
# overhead. The indys that remain are the string-concat (makeConcatWithConstants
# in decorate / the reduce) and the genuinely native or reverted cases (capObj,
# capArr, capFld, lone, loneMulti, multiFil, named, …); the twelve that disappear
# are the fusion win. Which indy collapses into which mapMulti is proven per-rule
# by the src/test/phino/ packs — this fixture proves the rules COMPOSE on a real
# class.
#
# Update (issue #655): the multi-int-capture filter is lifted and folded. 113
# now lifts a "(I+)L…Predicate;" factory (one OR MORE int captures), 118 peels
# every push into the shared List, and 314 folds it into a stateful distill with
# the same N-ary park/reload body 316 gives a capturing map. multiFil
# (filter(n>lo && n<hi), two int captures) therefore lifts and folds exactly like
# a capturing map; but having no map/filter neighbour to fuse with at 401, it is
# reverted by the lone-filter revert 447 (which runs before 451) and stays in the
# "native or reverted" set, its trailing mapToInt left native — two indys. Folding
# the trailing mapToInt of a LONE capturing operator into a single mapMultiToInt
# would require 451 to run before 446/447; that is a follow-up optimisation, not
# done here, and would trade two native indys for one mapMultiToInt that pays the
# capture-List overhead per element.
#
# Native roundtrip shapes — must survive untouched:
#   bound   : String::length             unbound-instance method ref
#   capObj  : List captured in lambda     reference capture
#   capArr  : int[1] captured             array / effectively-final workaround
#   capFld  : this.field read             implicit-this capture (instanceRun)
#   instRef : self::decorate              bound (captured-receiver) instance ref
#   refArg  : Predicate / Function params refs supplied as method arguments
#   refs    : X::isOdd / X::triple        every operator a static method ref
#   sField  : static final read           constant read from a lambda body
#   sHelp   : isPrime / square helpers    lambda delegates to a static helper
#   named   : new Good() / new Doubler()  Predicate / Function as named classes
#
# Capturing fusion shapes (issue #636) — must fuse, revert, or stay native:
#   capLoc    : filter(n>t).map(n+off)    single-int-capture filter+map FUSE
#   multiCap  : map(+1).map(+x+y+z)       three-int-capture map fuses (v1.1)
#   lone      : map(n+off)                lone single-capture map REVERTS to native
#   loneMulti : map(n+p+q)                lone multi-capture map -> standalone mapMulti
#   multiFil  : filter(n>lo && n<hi)      multi-int-capture filter FUSES (issue #655)
java: |
  package closures;
  import java.util.*;
  import java.util.function.*;
  import java.util.stream.*;
  public class X {
    private static final int LIMIT = 4;
    private static final int BIAS = 1000;
    private final int factor;
    private final int floor;
    X(int f, int fl) { this.factor = f; this.floor = fl; }
    String decorate(Integer n) { return ">" + n; }
    static class Good implements Predicate<Integer> {
      public boolean test(Integer n) { return n > 2; }
    }
    static class Doubler implements Function<Integer, Integer> {
      public Integer apply(Integer n) { return n * 2; }
    }
    static boolean isOdd(int n) { return (n & 1) == 1; }
    static int triple(int n) { return n * 3; }
    static boolean keep(Integer n) { return n > 2; }
    static Integer alsoTriple(Integer n) { return n * 3; }
    private static boolean isPrime(int n) {
      if (n < 2) return false;
      for (int i = 2; i * i <= n; ++i) if (n % i == 0) return false;
      return true;
    }
    private static int square(int n) { return n * n; }
    int instanceRun() {
      return Stream.of(1, 2, 3, 4, 5)
        .filter(n -> n > this.floor)
        .map(n -> n * this.factor)
        .mapToInt(Integer::intValue)
        .sum();
    }
    static int viaRefArg(Predicate<Integer> p, Function<Integer, Integer> f) {
      return Stream.of(1, 2, 3, 4, 5).filter(p).map(f)
        .mapToInt(Integer::intValue).sum();
    }
    static int multiCapture(int x, int y, int z) {
      return Stream.of(1, 2, 3, 4, 5, 6)
        .map(i -> i + 1)
        .map(i -> i + x + y + z)
        .mapToInt(Integer::intValue)
        .sum();
    }
    static long loneMap(int offset) {
      return Stream.of(1, 2, 3, 4, 5).map(n -> n + offset).count();
    }
    static int loneMultiMap(int p, int q) {
      return Stream.of(1, 2, 3, 4).map(n -> n + p + q)
        .mapToInt(Integer::intValue).sum();
    }
    static int multiFilter(int lo, int hi) {
      return Stream.of(1, 2, 3, 4, 5, 6)
        .filter(n -> n > lo && n < hi)
        .mapToInt(Integer::intValue).sum();
    }
    public static void main(String[] a) {
      int bound = Stream.of("a", "bb", "ccc", "dddd", "eeeee")
        .filter(s -> s.length() > 1).map(String::length)
        .mapToInt(Integer::intValue).sum();
      List<Integer> allowed = Arrays.asList(2, 4, 6, 8);
      int capObj = Stream.of(1, 2, 3, 4, 5, 6, 7, 8, 9)
        .filter(n -> allowed.contains(n)).map(n -> n * 10)
        .mapToInt(Integer::intValue).sum();
      int[] counter = {0};
      Stream.of(1, 2, 3, 4, 5)
        .filter(n -> n > 1)
        .map(n -> { counter[0] += n; return n; })
        .mapToInt(Integer::intValue).sum();
      int capArr = counter[0];
      int capFld = new X(7, 2).instanceRun();
      int threshold = 3, offset = 100;
      int capLoc = Stream.of(1, 2, 3, 4, 5, 6)
        .filter(n -> n > threshold).map(n -> n + offset)
        .mapToInt(Integer::intValue).sum();
      X self = new X(0, 0);
      String instRef = Stream.of(1, 2, 3, 4)
        .filter(n -> n > 1).map(self::decorate)
        .reduce("", (x, y) -> x + y);
      int refArg = viaRefArg(X::keep, X::alsoTriple);
      int refs = Stream.of(1, 2, 3, 4, 5, 6).mapToInt(Integer::intValue)
        .filter(X::isOdd).map(X::triple).sum();
      int sField = Stream.of(1, 2, 3, 4, 5, 6, 7)
        .filter(n -> n < LIMIT).map(n -> n + BIAS)
        .mapToInt(Integer::intValue).sum();
      int sHelp = Stream.of(1, 2, 3, 4, 5, 6, 7, 8, 9)
        .filter(n -> isPrime(n)).map(n -> square(n))
        .mapToInt(Integer::intValue).sum();
      int named = Stream.of(1, 2, 3, 4, 5)
        .filter(new Good()).map(new Doubler())
        .mapToInt(Integer::intValue).sum();
      int multiCap = multiCapture(10, 20, 30);
      long lone = loneMap(100);
      int loneMulti = loneMultiMap(5, 6);
      int multiFil = multiFilter(2, 6);
      System.out.printf(
        "The result is %d %d %d %d %d %s %d %d %d %d %d %d %d %d %d%n",
        bound, capObj, capArr, capFld, capLoc,
        instRef, refArg, refs, sField, sHelp, named,
        multiCap, lone, loneMulti, multiFil
      );
    }
  }
before:
  invokedynamic: 41
after:
  invokedynamic: 29
