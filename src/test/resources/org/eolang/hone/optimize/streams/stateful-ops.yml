---
# State-carrying intermediate operators. Only distinct is folded into
# the distill today; it fuses with the preceding .map(n -> n) into one
# Stream.mapMulti backed by a captured java/util/List that holds the
# seen-set, so the pinned `new` count proves both the List and the
# java/util/HashSet inside it were allocated.
#
#   distinct (216 -> 307 -> 502): captures a java/util/HashSet seen-set
#     inside the wrapper's java/util/List
#     input [1, 2, 2, 3, 1, 3, 4] -> [1, 2, 3, 4]; count() = 4
#     emits 2 `new` (the ArrayList and the HashSet) and a HashSet.add call.
#
# takeWhile and dropWhile are NOT recognised yet — no rule folds them —
# so they survive as their original lambdas and allocate no state cell
# (hence baload == bastore == 0). When they are migrated to the distill
# they will allocate a boolean[1] guard and these counts will change.
#
# The .map(n -> n) before each operator also keeps the class inside the
# default grep-in scope (which targets bodies containing any fusable Stream
# method, `map` among them, see #705).
java: |
  package stateful;
  import java.util.stream.*;
  public class X {
    public static void main(String[] a) {
      long distinct = Stream.of(1, 2, 2, 3, 1, 3, 4)
        .map(n -> n).distinct().count();
      long takeWhile = Stream.of(1, 2, 3, 100, 4, 5)
        .map(n -> n).takeWhile(n -> n < 10).count();
      long dropWhile = Stream.of(1, 2, 100, 4, 5, 6, 7)
        .map(n -> n).dropWhile(n -> n < 10).count();
      System.out.printf(
        "The result is %d %d %d\n", distinct, takeWhile, dropWhile
      );
    }
  }
log:
  - "Modified 1/1 X.phi"
  - "Finished rewriting 1 file"
  - "BUILD SUCCESS"
  - "The result is 4 3 5"
before:
  new: 0
  baload: 0
  bastore: 0
after:
  new: 2
  baload: 0
  bastore: 0
